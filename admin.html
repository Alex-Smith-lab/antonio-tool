<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0b; color:white; font-family:sans-serif; margin:0; display:flex; height:100vh; }
        #loginOverlay { position: fixed; inset: 0; background: #0b0b0b; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sidebar { width:230px; background:black; padding:20px; border-right:1px solid #222; display:none; }
        .tab-btn { width:100%; padding:14px; margin-bottom:10px; background:none; border:none; color:#999; text-align:left; cursor:pointer; border-radius: 6px; }
        .tab-btn.active { background:#7b2ff7; color:white; }
        .main { flex:1; padding:40px; overflow:auto; display:none; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        td, th { padding:12px; border-bottom:1px solid #222; text-align:left; font-size: 13px; }
        th { background: #111; color: #7b2ff7; }
        .btn { padding:6px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:11px; margin-right:5px; transition: 0.2s; }
        .green { background:#00c853; color:white; }
        .red { background:#ff4444; color:white; }
        .orange { background:#ff9800; color:white; }
        .blue { background:#007bff; color:white; }
        .purple { background:#7b2ff7; color:white; }
        .panel { background:#161616; padding:20px; border-radius:10px; margin-bottom:20px; }
        select, input[type="file"], input[type="email"] { padding:10px; background:#222; color:white; border:1px solid #444; margin:5px 0; width:100%; max-width:300px; border-radius: 5px; }
        .role-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .role-staff { background: #7b2ff7; color: white; }
        .role-coworker { background: #444; color: #ccc; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h2 style="color:#7b2ff7;">Admin Verification</h2>
    <p>Please enter your admin email to continue</p>
    <input type="email" id="adminEmailVerify" placeholder="antonymbali96@gmail.com">
    <button class="btn purple" onclick="verifyAdmin()" style="margin-top:10px; padding: 12px 30px;">Access Panel</button>
</div>

<div class="sidebar" id="sidebar">
    <h2 style="color:#7b2ff7;">a⌵ ADMIN</h2>
    <button class="tab-btn active" onclick="showTab('approvals',this)">Approvals & Staff</button>
    <button class="tab-btn" onclick="showTab('tasks',this)">Assign Task</button>
    <button class="tab-btn" onclick="showTab('supervision',this)">Supervision</button>
    <button class="tab-btn" onclick="showTab('export',this)" style="border: 1px dashed #7b2ff7; margin-top: 20px;">Export & Client Links</button>
</div>

<div class="main" id="mainContent">
    <div id="approvals" class="panel tab">
        <h2>User & Staff Management</h2>
        <table>
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <div id="tasks" class="panel tab" style="display:none">
        <h2>Assign New Task</h2>
        <div style="display:grid; gap:10px;">
            <label>1. Upload Image:</label>
            <input type="file" id="taskFile">
            <label>2. Assign To:</label>
            <select id="workerList"></select>
            <button class="btn green" onclick="sendTask()" style="width:200px; padding:12px; margin-top:10px;">Send Task</button>
        </div>
    </div>

    <div id="supervision" class="panel tab" style="display:none">
        <h2>Supervision</h2>
        <table>
            <thead><tr><th>Task ID</th><th>Worker</th><th>Boxes</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="supervisionTable"></tbody>
        </table>
    </div>

    <div id="export" class="panel tab" style="display:none">
        <h2>Export & Client Links</h2>
        <table>
            <thead><tr><th>Task ID</th><th>Worker</th><th>Status</th><th>Link</th></tr></thead>
            <tbody id="exportTable"></tbody>
        </table>
    </div>
</div>

<script>
const _supabase = window.supabase.createClient("https://qhftvfatzsogxbbqzxry.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w");

const MASTER_EMAIL = "antonymbali96@gmail.com";

async function verifyAdmin() {
    const emailInput = document.getElementById("adminEmailVerify").value.toLowerCase().trim();
    
    // Check if the user exists and has a staff role in the database
    const { data: user, error } = await _supabase.from("ant_users").select("*").eq("email", emailInput).single();

    if (emailInput === MASTER_EMAIL || (user && user.role === 'staff')) {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("sidebar").style.display = "block";
        document.getElementById("mainContent").style.display = "block";
        loadData();
    } else {
        alert("Access Denied. This page is restricted to Antony Mbali or authorized Staff.");
    }
}

function showTab(id, btn) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadData();
}

async function loadData() {
    const { data: users } = await _supabase.from("ant_users").select("*");
    const { data: tasks } = await _supabase.from("ant_tasks").select("*").order('created_at', { ascending: false });

    // User Table with Role Management
    document.getElementById("userTable").innerHTML = (users || []).map(u => `
        <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td><span class="role-badge ${u.role === 'staff' ? 'role-staff' : 'role-coworker'}">${u.role || 'coworker'}</span></td>
            <td><span style="color:${u.status === 'pending' ? 'orange' : 'lime'}">${u.status}</span></td>
            <td>
                ${u.status === 'pending' ? `<button class="btn green" onclick="updateStatus('${u.email}', 'approved')">Approve</button>` : ''}
                
                ${u.email !== MASTER_EMAIL ? `
                    ${u.role === 'staff' ? 
                        `<button class="btn orange" onclick="updateRole('${u.email}', 'coworker')">Demote to Coworker</button>` : 
                        `<button class="btn purple" onclick="updateRole('${u.email}', 'staff')">Make Staff (Admin)</button>`
                    }
                    <button class="btn red" onclick="removeUser('${u.email}')">Delete</button>
                ` : '<i>System Owner</i>'}
            </td>
        </tr>
    `).join("");

    // Worker Selection
    const approved = (users || []).filter(u => u.status === "approved");
    document.getElementById("workerList").innerHTML = '<option value="MASS_ASSIGN">-- MASS ASSIGN --</option>' + 
        approved.map(u => `<option value="${u.email}">${u.name}</option>`).join("");

    // Supervision
    document.getElementById("supervisionTable").innerHTML = (tasks || []).map(t => `
        <tr>
            <td><small>${t.id}</small></td>
            <td>${t.assignedto}</td>
            <td>${t.annotations ? t.annotations.length : 0}</td>
            <td style="color:cyan">${t.review_status || 'working'}</td>
            <td>
                <button class="btn blue" onclick="window.open('${t.review_link}', '_blank')">View</button>
                <button class="btn red" onclick="deleteTask('${t.id}')">Delete</button>
            </td>
        </tr>
    `).join("");
}

async function updateStatus(email, status) { 
    await _supabase.from("ant_users").update({ status }).eq("email", email); 
    loadData(); 
}

async function updateRole(email, role) {
    if(confirm(`Change this user to ${role}?`)) {
        await _supabase.from("ant_users").update({ role: role }).eq("email", email);
        loadData();
    }
}

async function removeUser(email) { 
    if(confirm("Delete user?")) { 
        await _supabase.from("ant_users").delete().eq("email", email); 
        loadData(); 
    } 
}

async function sendTask() {
    const file = document.getElementById("taskFile").files[0];
    const worker = document.getElementById("workerList").value;
    if (!file) return alert("Select file");

    const reader = new FileReader();
    reader.onload = async e => {
        await _supabase.from("ant_tasks").insert([{
            id: Date.now(),
            imgdata: e.target.result,
            assignedto: worker,
            completed: false,
            annotations: []
        }]);
        alert("Task Sent!");
        loadData();
    };
    reader.readAsDataURL(file);
}

async function deleteTask(taskId) { if(confirm("Delete?")) { await _supabase.from("ant_tasks").delete().eq("id", taskId); loadData(); } }

setInterval(loadData, 30000);
</script>
</body>
</html>
