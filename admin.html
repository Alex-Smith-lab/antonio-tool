<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin + Workspace (FULL SYSTEM)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:sans-serif;overflow:hidden}
#topbar{
position:fixed;top:0;left:0;right:0;height:50px;
background:#111;display:flex;align-items:center;
padding:0 15px;z-index:10;border-bottom:1px solid #222;
}
#canvas{position:absolute;top:50px;left:0}
.btn{background:#7b2ff7;border:none;color:white;padding:6px 10px;margin-right:5px;cursor:pointer;border-radius:5px}
</style>
</head>

<body>

<div id="topbar">
<button class="btn" onclick="mode='box'">📦 Box</button>
<button class="btn" onclick="mode='cuboid'">🧊 Cuboid</button>
<button class="btn" onclick="save()">💾 Save</button>
<button class="btn" onclick="loadTask()">🔄 Load</button>
</div>

<canvas id="canvas"></canvas>

<script>
// ✅ SUPABASE
const sb = supabase.createClient(
"https://qhftvfatzsogxbbqzxry.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w"
);

// 🎯 STATE
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let boxes = [];
let mode = "box";

let scale = 1;
let offsetX = 0, offsetY = 0;

let isDrawing = false;
let startX, startY;

let img = new Image();
let taskId = localStorage.getItem("taskId") || 1;

// 🧠 SMART SNAP
function snap(val){
return Math.round(val / 10) * 10;
}

// 🧊 DRAW CUBOID
function drawCuboid(x,y,w,h){
let depth = 20;

// front
ctx.strokeRect(x,y,w,h);

// back
ctx.strokeRect(x+depth,y-depth,w,h);

// connect lines
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x+depth,y-depth);

ctx.moveTo(x+w,y);
ctx.lineTo(x+w+depth,y-depth);

ctx.moveTo(x,y+h);
ctx.lineTo(x+depth,y+h-depth);

ctx.moveTo(x+w,y+h);
ctx.lineTo(x+w+depth,y+h-depth);

ctx.stroke();
}

// 🎨 DRAW
function draw(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(offsetX, offsetY);
ctx.scale(scale, scale);

ctx.drawImage(img,0,0);

// draw annotations
boxes.forEach(b=>{
ctx.strokeStyle = b.type === "cuboid" ? "orange" : "lime";

if(b.type === "cuboid"){
drawCuboid(b.x,b.y,b.w,b.h);
}else{
ctx.strokeRect(b.x,b.y,b.w,b.h);
}
});

ctx.restore();
}

// 🖱 EVENTS
canvas.onmousedown = (e)=>{
isDrawing = true;
startX = (e.offsetX - offsetX)/scale;
startY = (e.offsetY - offsetY)/scale;
};

canvas.onmousemove = (e)=>{
if(!isDrawing) return;
draw();

let x = (e.offsetX - offsetX)/scale;
let y = (e.offsetY - offsetY)/scale;

let w = x - startX;
let h = y - startY;

ctx.strokeStyle="yellow";

// SNAP ENABLED
let sx = snap(startX);
let sy = snap(startY);
let sw = snap(w);
let sh = snap(h);

if(mode === "cuboid"){
drawCuboid(sx,sy,sw,sh);
}else{
ctx.strokeRect(sx,sy,sw,sh);
}
};

canvas.onmouseup = (e)=>{
isDrawing = false;

let x = (e.offsetX - offsetX)/scale;
let y = (e.offsetY - offsetY)/scale;

let w = x - startX;
let h = y - startY;

// SNAP FINAL
boxes.push({
x: snap(startX),
y: snap(startY),
w: snap(w),
h: snap(h),
type: mode
});

draw();
};

// 🔍 ZOOM
canvas.onwheel = (e)=>{
e.preventDefault();
scale *= e.deltaY < 0 ? 1.1 : 0.9;
draw();
};

// 🖐 PAN
let dragging=false;
canvas.oncontextmenu = ()=>false;

canvas.onmousedown = (e)=>{
if(e.button === 2){
dragging = true;
return;
}
isDrawing = true;
startX = (e.offsetX - offsetX)/scale;
startY = (e.offsetY - offsetY)/scale;
};

canvas.onmousemove = (e)=>{
if(dragging){
offsetX += e.movementX;
offsetY += e.movementY;
draw();
return;
}

if(!isDrawing) return;
draw();

let x = (e.offsetX - offsetX)/scale;
let y = (e.offsetY - offsetY)/scale;

let w = x - startX;
let h = y - startY;

let sx = snap(startX);
let sy = snap(startY);
let sw = snap(w);
let sh = snap(h);

ctx.strokeStyle="yellow";

if(mode === "cuboid"){
drawCuboid(sx,sy,sw,sh);
}else{
ctx.strokeRect(sx,sy,sw,sh);
}
};

canvas.onmouseup = ()=>{isDrawing=false; dragging=false};

// 💾 SAVE
async function save(){
await sb.from("ant_tasks")
.update({ annotations: boxes, completed:true })
.eq("id", taskId);

alert("Saved!");
}

// 🔄 LOAD
async function loadTask(){
const { data } = await sb.from("ant_tasks")
.select("*").eq("id", taskId).single();

if(!data) return alert("No task");

img.src = data.imgdata;
boxes = data.annotations || [];

img.onload = draw;
}

// INIT
loadTask();

</script>

</body>
</html>
