<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0b; color:white; font-family:sans-serif; margin:0; display:flex; height:100vh; }
        .sidebar { width:230px; background:black; padding:20px; border-right:1px solid #222; }
        .tab-btn { width:100%; padding:14px; margin-bottom:10px; background:none; border:none; color:#999; text-align:left; cursor:pointer; }
        .tab-btn.active { background:#7b2ff7; color:white; }
        .main { flex:1; padding:40px; overflow:auto; }
        table { width:100%; border-collapse:collapse; }
        td, th { padding:12px; border-bottom:1px solid #222; text-align:left; }
        .btn { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
        .green { background:#00c853; color:white; }
        .red { background:#ff4444; color:white; }
        .orange { background:#ff9800; color:white; }
        .panel { background:#161616; padding:25px; border-radius:12px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>a⌵ ADMIN</h2>
    <button class="tab-btn active" onclick="showTab('approvals',this)">Approvals & Staff</button>
    <button class="tab-btn" onclick="showTab('tasks',this)">Assign Task</button>
    <button class="tab-btn" onclick="showTab('supervision',this)">Supervision</button>
</div>

<div class="main">
    <div id="approvals" class="panel tab">
        <h2>Coworker Approvals</h2>
        <table>
            <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <div id="tasks" class="panel tab" style="display:none">
        <h2>Assign Task</h2>
        <input type="file" id="taskFile" style="margin-bottom:10px;"><br>
        <select id="workerList" style="padding:10px; width:250px; margin-bottom:10px;"></select><br>
        <button class="btn green" onclick="sendTask()">Upload & Assign</button>
    </div>

    <div id="supervision" class="panel tab" style="display:none">
        <h2>Supervision</h2>
        <table>
            <thead><tr><th>Task ID</th><th>Worker</th><th>Boxes</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="supervisionTable"></tbody>
        </table>
    </div>
</div>

<script>
const sb = window.supabase.createClient("https://qhftvfatzsogxbbqzxry.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w");

async function loadData() {
    const { data: users } = await sb.from("ant_users").select("*");
    const { data: tasks } = await sb.from("ant_tasks").select("*");

    document.getElementById("userTable").innerHTML = (users || []).map(u => `
        <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td style="color:${u.status==='approved'?'lime':'orange'}">${u.status}</td>
            <td>
                ${u.status==='pending' ? `<button class="btn green" onclick="updUsr('${u.email}','approved')">Approve</button>` : `<button class="btn orange" onclick="updUsr('${u.email}','pending')">Reject</button>`}
            </td>
        </tr>
    `).join("");

    document.getElementById("workerList").innerHTML = (users || []).filter(u=>u.status==='approved').map(u=>`<option value="${u.email}">${u.name}</option>`).join("");

    document.getElementById("supervisionTable").innerHTML = (tasks || []).map(t => `
        <tr>
            <td>${t.id}</td>
            <td>${t.assignedto}</td>
            <td>${t.annotations?.length || 0}</td>
            <td>${t.review_status || 'Working'}</td>
            <td>
                <button class="btn orange" onclick="returnWork('${t.id}')">Return</button>
                <button class="btn red" onclick="delTask('${t.id}')">Delete</button>
            </td>
        </tr>
    `).join("");
}

async function updUsr(email, status) { await sb.from("ant_users").update({ status }).eq("email", email); loadData(); }
async function delTask(id) { await sb.from("ant_tasks").delete().eq("id", id); loadData(); }
async function returnWork(id) { await sb.from("ant_tasks").update({ review_status: 'returned' }).eq("id", id); loadData(); }

async function sendTask() {
    const file = document.getElementById("taskFile").files[0];
    const worker = document.getElementById("workerList").value;
    const reader = new FileReader();
    reader.onload = async (e) => {
        await sb.from("ant_tasks").insert([{ id: Date.now(), imgdata: e.target.result, assignedto: worker, annotations: [] }]);
        alert("Assigned!"); loadData();
    };
    reader.readAsDataURL(file);
}

function showTab(id, btn) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
