<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antonio Annotation</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="css/styles.css">
</head>

<body oncontextmenu="return false;">

<!-- LOGIN -->
<div id="loginPage" class="auth-page">
<h1>a⌵ ANTONIO ANNOTATION</h1>
<h2>Worker Portal</h2>

<input id="userName" placeholder="Full Name">
<input id="userEmail" placeholder="Email">

<button onclick="handleLogin()">Login / Start Session</button>

<div id="waitMessage">Pending admin approval...</div>
</div>

<!-- TOP NAV -->
<div id="topNav">
<div>a⌵ WORKSPACE</div>

<div class="profile-area">
<button>Earnings: $<span id="balance">0.00</span></button>
<div id="workerProfile"></div>
<button onclick="logout()">Logout</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2 id="greet"></h2>
<p id="seasonalMsg"></p>
<div id="tasks" class="task-grid"></div>
</div>

<!-- WORKSPACE -->
<div id="workspacePage">
<canvas id="canvas"></canvas>
<div id="sidePanel">
<div id="annoList"></div>
<button onclick="deleteBox()">DELETE</button>
<button onclick="submitForReview()">SUBMIT</button>
</div>
</div>

<script src="js/supabaseClient.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/workspace.js"></script>

</body>
</html>
