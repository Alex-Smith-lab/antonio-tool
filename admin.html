<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { background:#0b0b0b; color:white; font-family:sans-serif; margin:0; display:flex; height:100vh; }
.sidebar { width:230px; background:black; padding:20px; border-right:1px solid #222; }
.tab-btn { width:100%; padding:14px; margin-bottom:10px; background:none; border:none; color:#999; text-align:left; cursor:pointer; border-radius: 6px; }
.tab-btn.active { background:#7b2ff7; color:white; }
.main { flex:1; padding:40px; overflow:auto; }
table { width:100%; border-collapse:collapse; margin-top:15px; }
td, th { padding:12px; border-bottom:1px solid #222; text-align:left; font-size: 13px; }
th { background: #111; color: #7b2ff7; }
.btn { padding:6px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:11px; margin-right:5px; transition: 0.2s; }
.green { background:#00c853; color:white; }
.red { background:#ff4444; color:white; }
.orange { background:#ff9800; color:white; }
.blue { background:#007bff; color:white; }
.purple { background:#7b2ff7; color:white; }
.panel { background:#161616; padding:20px; border-radius:10px; margin-bottom:20px; }
select, input[type="file"] { padding:10px; background:#222; color:white; border:1px solid #444; margin:5px 0; width:100%; max-width:300px; border-radius: 5px; }
.anno-count { background: #333; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
.copy-link-text { font-family: monospace; color: #7b2ff7; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<div class="sidebar">
<h2 style="color:#7b2ff7;">a⌵ ADMIN</h2>
<button class="tab-btn active" onclick="showTab('approvals',this)">Approvals & Staff</button>
<button class="tab-btn" onclick="showTab('tasks',this)">Assign Task</button>
<button class="tab-btn" onclick="showTab('supervision',this)">Supervision</button>
<button class="tab-btn" onclick="showTab('export',this)" style="border: 1px dashed #7b2ff7; margin-top: 20px;">Export & Client Links</button>
</div>

<div class="main">
<div id="approvals" class="panel tab">
<h2>Coworker Management</h2>
<table>
<thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
<tbody id="userTable"></tbody>
</table>
</div>

<div id="tasks" class="panel tab" style="display:none">
<h2>Assign New Task</h2>
<div style="display:grid; gap:10px;">
<label>1. Upload Image:</label>
<input type="file" id="taskFile">
<label>2. Assign To:</label>
<select id="workerList"></select>
<label>3. Assignment Phase:</label>
<select id="taskPhase">
<option value="1st Pass">1st Pass (Initial Labeling)</option>
<option value="Review">Review (Quality Check)</option>
</select>
<button class="btn green" onclick="sendTask()" style="width:200px; padding:12px; margin-top:10px;">Send Task</button>
</div>
</div>

<div id="supervision" class="panel tab" style="display:none">
<h2>Admin Final Check & Supervision</h2>
<table>
<thead><tr><th>Task ID</th><th>Worker</th><th>Boxes</th><th>Status</th><th>Actions</th></tr></thead>
<tbody id="supervisionTable"></tbody>
</table>
</div>

<div id="export" class="panel tab" style="display:none">
<div style="display:flex; justify-content:space-between; align-items:center;">
<h2>Export & Client Links</h2>
<button class="btn green" onclick="exportToCSV()" style="padding:10px 20px;">Download CSV Report</button>
</div>
<p style="font-size:12px; color:#999;">Provide these links to your customers to review completed annotations.</p>
<table>
<thead>
<tr>
<th>Task ID</th>
<th>Worker Email</th>
<th>Status</th>
<th>Boxes</th>
<th>Customer Review Link</th>
</tr>
</thead>
<tbody id="exportTable"></tbody>
</table>
</div>
</div>

<script>
const _supabase = window.supabase.createClient("https://qhftvfatzsogxbbqzxry.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w");

let allTasks = [];

function showTab(id, btn) {
document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
document.getElementById(id).style.display = "block";
document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
btn.classList.add("active");
loadData();
}

async function loadData() {
const { data: users } = await _supabase.from("ant_users").select("*");
const { data: tasks } = await _supabase.from("ant_tasks").select("*").order('created_at', { ascending: false });
allTasks = tasks || [];

// User Table
document.getElementById("userTable").innerHTML = (users || []).map(u => `
<tr>
<td>${u.name}</td>
<td>${u.email}</td>
<td><span style="color:${u.status === 'pending' ? 'orange' : 'lime'}">${u.status}</span></td>
<td>
${u.status === 'pending' ? `<button class="btn green" onclick="updateStatus('${u.email}', 'approved')">Approve</button>` : `<button class="btn orange" onclick="updateStatus('${u.email}', 'pending')">Return to Waitlist</button>`}
<button class="btn red" onclick="removeUser('${u.email}')">Delete</button>
</td>
</tr>
`).join("");

// Worker Selection
const approved = (users || []).filter(u => u.status === "approved");
document.getElementById("workerList").innerHTML = '<option value="MASS_ASSIGN">-- MASS ASSIGN (All Accounts) --</option>' +
approved.map(u => `<option value="${u.email}">${u.name}</option>`).join("");

// Supervision Table
document.getElementById("supervisionTable").innerHTML = allTasks.map(t => {
const boxCount = t.annotations ? t.annotations.length : 0;
const statusText = t.review_status === 'review_pending' ? 'Needs Review' : (t.completed ? 'Completed' : 'Working');
return `
<tr>
<td><small>${t.id}</small></td>
<td>${t.assignedto}</td>
<td><span class="anno-count">${boxCount} Boxes</span></td>
<td><span style="color:${t.completed ? 'lime' : 'cyan'}">${statusText}</span></td>
<td>
<button class="btn blue" onclick="viewWork('${t.id}')">Open</button>
${t.review_status === 'review_pending' ? `<button class="btn green" onclick="approveTask('${t.id}')">Approve</button>` : ''}
<button class="btn orange" onclick="returnToWorker('${t.id}')">Return</button>
<button class="btn red" onclick="deleteTask('${t.id}')">Delete</button>
</td>
</tr>
`;
}).join("");

// Export Table
document.getElementById("exportTable").innerHTML = allTasks.map(t => {
const link = t.review_link || "Not Generated Yet";
return `
<tr>
<td><small>${t.id}</small></td>
<td>${t.assignedto}</td>
<td>${t.completed ? '✅ Finished' : '⏳ Pending'}</td>
<td>${t.annotations ? t.annotations.length : 0}</td>
<td>
<span class="copy-link-text" onclick="copyText('${link}')">Copy Review Link 🔗</span>
</td>
</tr>
`;
}).join("");
}

function copyText(txt) {
if(txt === "Not Generated Yet") return alert("No link available. Task must be opened or submitted by worker first.");
navigator.clipboard.writeText(txt);
alert("Link copied for customer!");
}

function exportToCSV() {
let csv = "Task ID,Assigned To,Box Count,Status,Review Link\n";
allTasks.forEach(t => {
csv += `${t.id},${t.assignedto},${t.annotations ? t.annotations.length : 0},${t.completed ? 'Completed' : 'Pending'},"${t.review_link || ''}"\n`;
});
const blob = new Blob([csv], { type: 'text/csv' });
const url = window.URL.createObjectURL(blob);
const a = document.createElement('a');
a.setAttribute('href', url);
a.setAttribute('download', `Task_Export_${Date.now()}.csv`);
a.click();
}

async function updateStatus(email, status) { await _supabase.from("ant_users").update({ status }).eq("email", email); loadData(); }
async function removeUser(email) { if(confirm("Delete user?")) { await _supabase.from("ant_users").delete().eq("email", email); loadData(); } }

async function approveTask(taskId) {
await _supabase.from("ant_tasks").update({ completed: true, review_status: 'approved' }).eq("id", taskId);
alert("Task Approved!");
loadData();
}

async function returnToWorker(taskId) {
if(confirm("Return work to coworker for corrections?")) {
await _supabase.from("ant_tasks").update({ completed: false, review_status: 'returned' }).eq("id", taskId);
loadData();
}
}

async function sendTask() {
const file = document.getElementById("taskFile").files[0];
const worker = document.getElementById("workerList").value;
const phase = document.getElementById("taskPhase").value;
if (!file) return alert("Select file");

const reader = new FileReader();
reader.onload = async e => {
const taskId = Date.now();
await _supabase.from("ant_tasks").insert([{
id: taskId,
imgdata: e.target.result,
assignedto: worker,
phase: phase,
completed: false,
review_status: null,
annotations: []
}]);
alert("Task Sent!");
loadData();
};
reader.readAsDataURL(file);
}

async function deleteTask(taskId) { if(confirm("Delete?")) { await _supabase.from("ant_tasks").delete().eq("id", taskId); loadData(); } }
function viewWork(id) {
const link = allTasks.find(t => t.id == id)?.review_link;
if(link) window.open(link, '_blank'); else alert("No link generated yet. Ensure worker has opened the task.");
}

setInterval(loadData, 15000);
loadData();
</script>
</body>
</html>
