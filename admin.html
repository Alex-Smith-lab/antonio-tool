<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TM Admin - Control Center</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-gate" class="auth-overlay">
        <div class="auth-box">
            <h1 class="logo">TM <span>ADMIN</span></h1>
            <input type="text" id="adminEmailInput" placeholder="Admin Email">
            <button class="btn purple" onclick="checkAuth()">Login</button>
        </div>
    </div>

    <div id="admin-content" style="display:none; height: 100vh; width: 100vw; display: flex;">
        <div class="sidebar">
            <h3 class="logo">TM <span>DASHBOARD</span></h3>
            <button class="tab-btn active" onclick="showTab('approvals',this)">Staff Management</button>
            <button class="tab-btn" onclick="showTab('tasks',this)">Assign Task</button>
        </div>
        <div class="main">
            <div id="approvals" class="panel tab">
                <h2>Coworker Management</h2>
                <table>
                    <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
            <div id="tasks" class="panel tab" style="display:none">
                <h2>Deploy New Task</h2>
                <input type="file" id="taskFile">
                <select id="workerList"></select>
                <select id="toolType">
                    <option>2D Box</option><option>3D Cuboid</option>
                    <option>Lidar</option><option>Polygon</option>
                </select>
                <button class="btn green" onclick="sendTask()">Deploy</button>
            </div>
        </div>
    </div>
    <script src="admin-auth.js"></script>
    <script src="admin-core.js"></script>
</body>
</html>
