<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antonio Annotation - Enterprise</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --purple: #7b2ff7; --bg: #0b0b0b; --card: #161616; --border: #333; --blue: #007bff; --orange: #ff9800; --red: #ff4444; }
body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }

#topNav { position: fixed; top: 0; width: 100%; height: 60px; background: black; border-bottom: 1px solid #222; display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; box-sizing: border-box; }
.profile-area { display: flex; align-items: center; gap: 15px; }
.spreadsheet-btn { background: #1d6f42; color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; border: none; font-weight: bold; }

#dashboard { padding: 100px 60px; display: none; overflow-y: auto; height: 100vh; box-sizing: border-box; }
.task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
.batch-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; position: relative; }
.card-header { height: 50px; background: rgba(255,255,255,0.05); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
.status-badge { background: var(--purple); color: white; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }

#workspacePage { display: none; position: fixed; inset: 0; background: #050505; z-index: 200; }
#workzone { position: absolute; left: 0; top: 0; right: 300px; bottom: 0; cursor: crosshair; overflow: hidden; }
#sidePanel { position: absolute; right: 0; top: 0; width: 300px; bottom: 0; background: #111; border-left: 1px solid #222; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
.anno-item { background: #222; padding: 10px; margin-bottom: 5px; border-radius: 4px; font-size: 13px; display: flex; justify-content: space-between; border-left: 3px solid var(--purple); cursor: pointer; }

#labelPopup { position: fixed; background: #1a1a1a; border: 1px solid var(--purple); padding: 15px; border-radius: 8px; z-index: 500; display: none; flex-direction: column; gap: 5px; }
.label-btn { padding: 8px 15px; background: #333; border: none; color: white; border-radius: 4px; cursor: pointer; text-align: left; }
.label-btn:hover { background: var(--purple); }

.reassign-section { margin-top: auto; padding-top: 15px; border-top: 1px solid #333; }
.reassign-btn { width: 100%; background: var(--orange); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }

.bottom-bar { position: fixed; bottom: 0; width: 100%; height: 40px; background: #000; border-top: 1px solid #222; color: #888; display: none; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 11px; z-index: 300; }
</style>
</head>
<body>

<div id="loginPage" style="text-align: center; padding-top: 100px;">
<h1 style="color:var(--purple)">ANTONIO ANNOTATION</h1>
<input id="userEmail" placeholder="Email" style="padding:10px; width:250px; background:#222; color:white; border:1px solid #444; border-radius:5px;"><br><br>
<button onclick="handleLogin()" style="padding:10px 50px; background:var(--blue); color:white; border:none; border-radius:5px; cursor:pointer;">Enter Workspace</button>
</div>

<div id="topNav">
<div style="font-weight: bold; color:var(--purple)">a⌵ ENTERPRISE</div>
<div class="profile-area">
<button class="spreadsheet-btn">Earnings: $<span id="balance">0.00</span></button>
<div id="workerProfile" style="font-size: 12px;"></div>
<button onclick="logout()" style="color:var(--red); background:none; border:none; cursor:pointer;">Logout</button>
</div>
</div>

<div id="dashboard">
<h2 id="greet"></h2>
<div id="tasks" class="task-grid"></div>
</div>

<div id="workspacePage">
<div id="workzone"><canvas id="canvas"></canvas></div>
<div id="sidePanel">
<div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:15px;">
<span style="font-size: 12px; font-weight: bold;">WORKSPACE TOOLS</span>
<button onclick="closeWorkspace()" style="background:#333; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">EXIT</button>
</div>
<div id="annoList" style="flex-grow:1; overflow-y:auto;"></div>
<div class="reassign-section">
<button id="reassignBtn" class="reassign-btn" onclick="reassignToReview()">REASSIGN TO REVIEW</button>
<button id="submitBtn" onclick="submitTask()" style="width:100%; background:var(--blue); color:white; border:none; padding:15px; border-radius:6px; font-weight:bold; cursor:pointer;">SUBMIT PROGRESS</button>
</div>
</div>

<div id="labelPopup">
<button class="label-btn" onclick="assignLabel('Car')">Car</button>
<button class="label-btn" onclick="assignLabel('Truck')">Truck</button>
<button class="label-btn" onclick="assignLabel('Pedestrian')">Pedestrian</button>
<button class="label-btn" onclick="assignLabel('Bus')">Bus</button>
</div>

<div style="position:fixed; bottom:60px; left:20px; display:flex; gap:10px;">
<button onclick="toggleDrawMode()" id="addBtn" style="padding:10px 20px; background:var(--purple); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">ADD BOX</button>
<button onclick="undo()" style="padding:10px 20px; background:#444; color:white; border:none; border-radius:5px; cursor:pointer;">UNDO</button>
</div>
</div>

<div class="bottom-bar" id="footerBar">
<div id="footerWorker">SYSTEM ACTIVE</div>
<div>LINK: <span id="liveLink" style="color:var(--blue)">---</span></div>
</div>

<script>
const sb = window.supabase.createClient("https://qhftvfatzsogxbbqzxry.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w");

let user = null, activeId = null, taskData = null, boxes = [], selectedBoxIdx = -1, isDrawMode = false;
let scale = 1, offsetX = 0, offsetY = 0, isDragging = false, lastX, lastY;
let canvas, ctx, img = new Image();

window.onload = async () => {
    const savedEmail = localStorage.getItem('workerEmail');
    const urlParams = new URLSearchParams(window.location.search);
    const tid = urlParams.get('tid') || localStorage.getItem('activeTaskId');

    if(savedEmail) {
        const { data } = await sb.from("ant_users").select("*").eq("email", savedEmail).single();
        if(data) {
            user = data;
            if(tid) openWork(tid); else showDashboard();
        }
    }
};

async function handleLogin() {
    const email = document.getElementById("userEmail").value.trim().toLowerCase();
    const { data } = await sb.from("ant_users").select("*").eq("email", email).single();
    if(data) {
        user = data;
        localStorage.setItem('workerEmail', email);
        showDashboard();
    } else alert("Access Denied");
}

async function showDashboard() {
    activeId = null;
    localStorage.removeItem('activeTaskId');
    window.history.replaceState({}, '', window.location.pathname);
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("topNav").style.display = "flex";
    document.getElementById("workspacePage").style.display = "none";
    document.getElementById("footerBar").style.display = "flex";

    document.getElementById("greet").innerText = `Welcome, ${user.name}`;
    document.getElementById("workerProfile").innerText = user.email;

    const { data: tasks } = await sb.from("ant_tasks")
        .select("*")
        .or(`assignedto.eq.${user.email},assignedto.eq.UNASSIGNED`)
        .neq("phase", "Export");

    document.getElementById("tasks").innerHTML = (tasks || []).map(t => `
        <div class="batch-card">
            <div class="card-header"><span class="status-badge">${t.phase}</span></div>
            <div style="padding:15px;">
                <p style="font-size:12px; margin:0;">ID: #${t.id.toString().slice(-6)}</p>
                <button onclick="openWork('${t.id}')" style="width:100%; margin-top:10px; padding:8px; background:var(--purple); border:none; color:white; cursor:pointer; border-radius:4px;">OPEN TASK</button>
            </div>
        </div>
    `).join("");
}

async function openWork(id) {
    activeId = id;
    localStorage.setItem('activeTaskId', id);
    window.history.pushState({}, '', `?tid=${id}`);
    
    const { data } = await sb.from("ant_tasks").select("*").eq("id", id).single();
    taskData = data;
    boxes = data.annotations || [];
    
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("workspacePage").style.display = "block";
    document.getElementById("liveLink").innerText = window.location.href;
    
    // Visibility of Reassign Button (Only in 1st Pass or for Admins)
    document.getElementById("reassignBtn").style.display = (taskData.phase === "1st Pass") ? "block" : "none";
    
    canvas = document.getElementById("canvas");
    ctx = canvas.getContext("2d");
    img.src = data.imgdata;
    img.onload = () => { resetView(); draw(); updateSidePanel(); updatePay(); };

    canvas.onmousedown = handleDown;
    window.onmousemove = handleMove;
    window.onmouseup = () => { isDragging = false; save(); };
}

async function reassignToReview() {
    const { error } = await sb.from("ant_tasks").update({ 
        phase: 'Review',
        completed: false 
    }).eq("id", activeId);
    if(!error) {
        alert("Task moved to Review Inbox");
        closeWorkspace();
    }
}

async function submitTask() {
    let nextPhase = (taskData.phase === "Review") ? "Export" : "1st Pass";
    await sb.from("ant_tasks").update({ 
        phase: nextPhase, 
        completed: (nextPhase === "Export"),
        annotations: boxes 
    }).eq("id", activeId);
    alert("Task Submitted Successfully");
    closeWorkspace();
}

function assignLabel(l) {
    if(selectedBoxIdx > -1) {
        // Financial Logic: If Reviewer edits a box they didn't create
        if(taskData.phase === "Review" && boxes[selectedBoxIdx].creator !== user.email) {
            boxes[selectedBoxIdx].penalty_applied = true;
            boxes[selectedBoxIdx].reviewer_bonus = true;
        }
        boxes[selectedBoxIdx].label = l;
        document.getElementById("labelPopup").style.display = "none";
        draw(); updateSidePanel(); updatePay(); save();
    }
}

function updatePay() {
    let base = (taskData.phase === "Review") ? 0.018 : 0.019;
    let earnings = boxes.length * base;
    document.getElementById("balance").innerText = earnings.toFixed(3);
}

function save() {
    if(activeId) sb.from("ant_tasks").update({ annotations: boxes, review_link: window.location.href }).eq("id", activeId);
}

// Maintenance Tools
function resetView() { scale = 0.8; offsetX = 50; offsetY = 50; }
function draw() {
    canvas.width = window.innerWidth - 300; canvas.height = window.innerHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    boxes.forEach((b, i) => {
        ctx.strokeStyle = i === selectedBoxIdx ? "cyan" : "lime";
        ctx.lineWidth = 2/scale;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
    });
    ctx.restore();
}

function handleDown(e) {
    const mx = (e.clientX - offsetX) / scale;
    const my = (e.clientY - offsetY) / scale;
    if(isDrawMode) {
        const sx = mx, sy = my;
        canvas.onmouseup = (e2) => {
            const ex = (e2.clientX - offsetX) / scale;
            const ey = (e2.clientY - offsetY) / scale;
            boxes.push({ x: sx, y: sy, w: ex-sx, h: ey-sy, label: 'New', creator: user.email });
            selectedBoxIdx = boxes.length - 1;
            showPopup(e2.clientX, e2.clientY);
            toggleDrawMode();
        };
    } else {
        selectedBoxIdx = boxes.findIndex(b => mx > b.x && mx < b.x+b.w && my > b.y && my < b.y+b.h);
        if(selectedBoxIdx === -1) { isDragging = true; lastX = e.clientX; lastY = e.clientY; }
        else showPopup(e.clientX, e.clientY);
        draw(); updateSidePanel();
    }
}

function handleMove(e) { if(isDragging){ offsetX+=e.clientX-lastX; offsetY+=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; draw(); } }
function showPopup(x, y) { const p = document.getElementById("labelPopup"); p.style.display="flex"; p.style.left=x+"px"; p.style.top=y+"px"; }
function toggleDrawMode() { isDrawMode = !isDrawMode; document.getElementById("addBtn").style.background = isDrawMode ? "white" : "var(--purple)"; document.getElementById("addBtn").style.color = isDrawMode ? "black" : "white"; }
function updateSidePanel() { document.getElementById("annoList").innerHTML = boxes.map((b,i) => `<div class="anno-item" onclick="selectedBoxIdx=${i};draw();">#${i+1} ${b.label}</div>`).join(""); }
function closeWorkspace() { showDashboard(); }
function logout() { localStorage.clear(); location.reload(); }
function undo() { boxes.pop(); draw(); updateSidePanel(); updatePay(); save(); }
</script>
</body>
</html>
