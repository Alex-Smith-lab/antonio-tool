<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - Antony Mbali Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0b; color:white; font-family:sans-serif; margin:0; display:flex; height:100vh; }
        .sidebar { width:230px; background:black; padding:20px; border-right:1px solid #222; }
        .tab-btn { width:100%; padding:14px; margin-bottom:10px; background:none; border:none; color:#999; text-align:left; cursor:pointer; }
        .tab-btn.active { background:#7b2ff7; color:white; }
        .main { flex:1; padding:40px; overflow:auto; }
        table { width:100%; border-collapse:collapse; }
        td,th { padding:10px; border-bottom:1px solid #222; }
        .btn { padding:8px 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
        .green {background:#00c853;color:white}
        .red {background:#ff4444;color:white}
        .panel { background:#161616; padding:20px; border-radius:10px; }
        input, select { padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #333; background: #222; color: white; width: 100%; max-width: 300px; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>a⌵ ADMIN</h2>
    <button class="tab-btn active" onclick="showTab('approvals',this)">Approvals</button>
    <button class="tab-btn" onclick="showTab('tasks',this)">Assign Task</button>
    <button class="tab-btn" onclick="showTab('tracking',this)">Tracking</button>
</div>

<div class="main">
    <div id="approvals" class="panel tab">
        <h2>Coworker Approvals</h2>
        <table>
            <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Role</th><th>Action</th></tr></thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <div id="tasks" class="panel tab" style="display:none">
        <h2>Assign Task</h2>
        <input type="file" id="taskFile"><br>
        <select id="workerList"><option>Loading...</option></select><br>
        <button class="btn green" onclick="sendTask()">Send Task</button>
    </div>

    <div id="tracking" class="panel tab" style="display:none">
        <h2>Worker Tracking</h2>
        <table>
            <thead><tr><th>Name</th><th>Email</th><th>Status</th></tr></thead>
            <tbody id="trackingTable"></tbody>
        </table>
    </div>
</div>

<script>
// Use a different name to avoid SyntaxError
const _supabase = window.supabase.createClient(
    "https://qhftvfatzsogxbbqzxry.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w"
);

function showTab(id,btn){
    document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
    document.getElementById(id).style.display="block";
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadData();
}

async function loadData(){
    const {data:users, error} = await _supabase.from("ant_users").select("*");
    if(error) return console.log(error);

    // Update Approvals
    document.getElementById("userTable").innerHTML = users.map(u=>`
        <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td style="color:${u.status==='pending'?'orange':'lime'}">${u.status}</td>
            <td>${u.role}</td>
            <td>
                ${u.status==="pending" ? `<button class="btn green" onclick="approve('${u.email}')">Approve</button>` : ""}
                <button class="btn red" onclick="removeUser('${u.email}')">Delete</button>
            </td>
        </tr>
    `).join("");

    // Update Task Worker List (Only approved workers)
    const approved = users.filter(u=>u.status==="approved" && u.role==="worker");
    document.getElementById("workerList").innerHTML = approved.length 
        ? approved.map(u=>`<option value="${u.email}">${u.name}</option>`).join("")
        : "<option disabled>No approved workers</option>";

    // Update Tracking
    document.getElementById("trackingTable").innerHTML = users.map(u=>`
        <tr><td>${u.name}</td><td>${u.email}</td><td>${u.status}</td></tr>
    `).join("");
}

async function approve(email){
    await _supabase.from("ant_users").update({status:"approved"}).eq("email",email);
    loadData();
}

async function removeUser(email){
    if(confirm("Delete this user?")) {
        await _supabase.from("ant_users").delete().eq("email",email);
        loadData();
    }
}

function sendTask(){
    const file = document.getElementById("taskFile").files[0];
    const worker = document.getElementById("workerList").value;
    if(!file || !worker) return alert("Select image and worker");

    const reader = new FileReader();
    reader.onload = async e => {
        const {error} = await _supabase.from("ant_tasks").insert([{
            id: Date.now(),
            imgdata: e.target.result,
            assignedto: worker,
            completed: false
        }]);
        if(error) alert("Failed");
        else alert("Task assigned!");
    };
    reader.readAsDataURL(file);
}

setInterval(loadData, 5000); // Auto-sync every 5s
loadData();
</script>
</body>
</html>
