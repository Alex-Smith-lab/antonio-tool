<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - Advanced Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0b; color:white; font-family:sans-serif; margin:0; display:flex; height:100vh; }
        .sidebar { width:240px; background:black; padding:20px; border-right:1px solid #222; }
        .tab-btn { width:100%; padding:14px; margin-bottom:10px; background:none; border:none; color:#999; text-align:left; cursor:pointer; border-radius: 6px; }
        .tab-btn.active { background:#7b2ff7; color:white; }
        .main { flex:1; padding:40px; overflow:auto; }
        table { width:100%; border-collapse:collapse; background: #111; }
        td, th { padding:14px; border-bottom:1px solid #222; text-align:left; font-size: 13px; }
        .btn { padding:6px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; }
        .green { background:#00c853; color:white; }
        .purple { background:#7b2ff7; color:white; }
        .panel { background:#161616; padding:20px; border-radius:10px; margin-bottom:20px; }
        select, input { padding:10px; background:#222; color:white; border:1px solid #444; width:100%; margin:5px 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:#7b2ff7;">a⌵ ADMIN PRO</h2>
    <button class="tab-btn active" onclick="showTab('approvals',this)">Staff Management</button>
    <button class="tab-btn" onclick="showTab('tasks',this)">New Task</button>
    <button class="tab-btn" onclick="showTab('reviewQueue',this)">Review Assignment</button>
    <button class="tab-btn" onclick="showTab('export',this)">Export Reports</button>
</div>

<div class="main">
    <div id="approvals" class="panel tab">
        <h2>Coworker Management</h2>
        <table><thead><tr><th>Name</th><th>Email</th><th>Action</th></tr></thead><tbody id="userTable"></tbody></table>
    </div>

    <div id="tasks" class="panel tab" style="display:none">
        <h2>Assign 1st Pass</h2>
        <input type="file" id="taskFile">
        <select id="workerList"></select>
        <button class="btn green" onclick="sendTask()">Push Task</button>
    </div>

    <div id="reviewQueue" class="panel tab" style="display:none">
        <h2>Ready for Review</h2>
        <table><thead><tr><th>ID</th><th>Assign Reviewer</th><th>Action</th></tr></thead><tbody id="reviewQueueTable"></tbody></table>
    </div>

    <div id="export" class="panel tab" style="display:none">
        <div style="display:flex; justify-content:space-between;">
            <h2>Export Tracking Sheet</h2>
            <button class="btn green" onclick="exportToCSV()">DOWNLOAD EXCEL SHEET</button>
        </div>
        <table><thead><tr><th>Task ID</th><th>Worker</th><th>Boxes</th><th>Link</th></tr></thead><tbody id="exportTable"></tbody></table>
    </div>
</div>

<script>
const _supabase = window.supabase.createClient("https://qhftvfatzsogxbbqzxry.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w");
let allTasks = [], allUsers = [];

async function loadData() {
    const { data: users } = await _supabase.from("ant_users").select("*");
    const { data: tasks } = await _supabase.from("ant_tasks").select("*").order('created_at', { ascending: false });
    allTasks = tasks || []; allUsers = users || [];
    renderAll();
}

function renderAll() {
    document.getElementById("userTable").innerHTML = allUsers.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td><button class="btn green" onclick="updateStatus('${u.email}', 'approved')">Approve</button></td></tr>`).join("");
    document.getElementById("workerList").innerHTML = allUsers.filter(u=>u.status==='approved').map(u => `<option value="${u.email}">${u.name}</option>`).join("");
    
    const ready = allTasks.filter(t => t.phase === '1st Pass' && t.completed === true);
    document.getElementById("reviewQueueTable").innerHTML = ready.map(t => `<tr><td>${t.id}</td><td><select id="rev_${t.id}">${allUsers.map(u=>`<option value="${u.email}">${u.name}</option>`)}</select></td><td><button class="btn purple" onclick="assignToReview('${t.id}')">Assign</button></td></tr>`).join("");

    document.getElementById("exportTable").innerHTML = allTasks.map(t => `<tr><td>${t.id}</td><td>${t.assignedto}</td><td>${t.annotations?.length || 0}</td><td><small>${t.review_link || 'N/A'}</small></td></tr>`).join("");
}

async function sendTask() {
    const file = document.getElementById("taskFile").files[0];
    const worker = document.getElementById("workerList").value;
    const reader = new FileReader();
    reader.onload = async e => {
        await _supabase.from("ant_tasks").insert([{ id: Date.now(), imgdata: e.target.result, assignedto: worker, phase: '1st Pass', completed: false, annotations: [] }]);
        loadData();
    };
    reader.readAsDataURL(file);
}

async function assignToReview(id) {
    const rev = document.getElementById(`rev_${id}`).value;
    await _supabase.from("ant_tasks").update({ assignedto: rev, phase: 'Review', completed: false }).eq("id", id);
    loadData();
}

function exportToCSV() {
    let csv = "TaskID,Worker,Phase,BoxCount,ReviewLink\n";
    allTasks.forEach(t => {
        csv += `${t.id},${t.assignedto},${t.phase},${t.annotations?.length || 0},${t.review_link}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('href', url);
    a.setAttribute('download', `Production_Report_${new Date().toLocaleDateString()}.csv`);
    a.click();
}

function showTab(id, btn) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadData();
}

setInterval(loadData, 5000); // 5-second sync for smooth communication
loadData();
</script>
</body>
</html>
