<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - Antony Mbali Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0b; color:white; font-family:sans-serif; margin:0; display:flex; height:100vh; }
        .sidebar { width:230px; background:black; padding:20px; border-right:1px solid #222; }
        .tab-btn { width:100%; padding:14px; margin-bottom:10px; background:none; border:none; color:#999; text-align:left; cursor:pointer; border-radius: 4px; }
        .tab-btn.active { background:#7b2ff7; color:white; }
        .main { flex:1; padding:40px; overflow:auto; }
        table { width:100%; border-collapse:collapse; margin-top: 20px; }
        td, th { padding:12px; border-bottom:1px solid #222; text-align: left; }
        .btn { padding:8px 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; margin-right: 5px; }
        .green { background:#00c853; color:white; }
        .red { background:#ff4444; color:white; }
        .panel { background:#161616; padding:20px; border-radius:10px; }
        input, select { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; width: 100%; max-width: 300px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>a⌵ ADMIN</h2>
    <button class="tab-btn active" onclick="showTab('approvals',this)">Approvals</button>
    <button class="tab-btn" onclick="showTab('tasks',this)">Assign Task</button>
    <button class="tab-btn" onclick="showTab('tracking',this)">Tracking</button>
</div>

<div class="main">
    <div id="approvals" class="panel tab">
        <h2>Coworker Approvals</h2>
        <table>
            <thead>
                <tr><th>Name</th><th>Email</th><th>Status</th><th>Role</th><th>Action</th></tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <div id="tasks" class="panel tab" style="display:none">
        <h2>Assign Task</h2>
        <label>Select Image File:</label><br>
        <input type="file" id="taskFile"><br>
        <label>Assign to Worker:</label><br>
        <select id="workerList"></select><br>
        <button class="btn green" onclick="sendTask()">Send Task</button>
    </div>

    <div id="tracking" class="panel tab" style="display:none">
        <h2>Worker Tracking</h2>
        <table>
            <thead>
                <tr><th>Name</th><th>Email</th><th>Status</th><th>Tasks</th></tr>
            </thead>
            <tbody id="trackingTable"></tbody>
        </table>
    </div>
</div>

<script>
const supabase = window.supabase.createClient("https://qhftvfatzsogxbbqzxry.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w");

function showTab(id, btn) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadData();
}

async function loadData() {
    const { data: users, error } = await supabase.from("ant_users").select("*").order('created_at', { ascending: false });
    if (error) return console.error(error);

    // 1. Update Approvals Table
    document.getElementById("userTable").innerHTML = users.map(u => `
        <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td><b style="color:${u.status === 'pending' ? '#ff9800' : '#00c853'}">${u.status}</b></td>
            <td>${u.role}</td>
            <td>
                ${u.status === "pending" ? `<button class="btn green" onclick="approve('${u.email}')">Approve</button>` : ""}
                <button class="btn red" onclick="removeUser('${u.email}')">Delete</button>
            </td>
        </tr>
    `).join("");

    // 2. Update Task Assignment Dropdown
    const approvedWorkers = users.filter(u => u.status === "approved" && u.role === "worker");
    document.getElementById("workerList").innerHTML = approvedWorkers.map(u => `
        <option value="${u.email}">${u.name} (${u.email})</option>
    `).join("") || "<option>No approved workers found</option>";

    // 3. Update Tracking Table
    document.getElementById("trackingTable").innerHTML = users.map(u => `
        <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td>${u.status}</td>
            <td>${u.role}</td>
        </tr>
    `).join("");
}

async function approve(email) {
    const { error } = await supabase.from("ant_users").update({ status: "approved" }).eq("email", email);
    if (error) alert("Approve failed");
    loadData();
}

async function removeUser(email) {
    if(confirm("Delete this user?")) {
        await supabase.from("ant_users").delete().eq("email", email);
        loadData();
    }
}

async function sendTask() {
    const file = document.getElementById("taskFile").files[0];
    const worker = document.getElementById("workerList").value;
    if (!file || !worker) return alert("Select image and worker");

    const reader = new FileReader();
    reader.onload = async e => {
        const { error } = await supabase.from("ant_tasks").insert([{
            id: Date.now(),
            imgdata: e.target.result,
            assignedto: worker,
            completed: false,
            annotations: []
        }]);
        if (error) alert("Task failed: " + error.message);
        else alert("Task assigned successfully");
    };
    reader.readAsDataURL(file);
}

// Auto-refresh every 5 seconds to catch new signups
setInterval(loadData, 5000);
loadData();
</script>
</body>
</html>
