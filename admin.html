<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Antony Mbali Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#0b0b0b;--card:#161616;--purple:#7b2ff7;--danger:#ff4444;--success:#00c853;}
        body{background:var(--bg); color:white; font-family:sans-serif; margin:0; padding:0;}
        .admin-container { display: flex; height: 100vh; }
        .sidebar { width: 220px; background: #000; border-right: 1px solid #222; padding: 20px; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .tab-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: none; border: 1px solid #333; color: white; text-align: left; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: var(--purple); border-color: var(--purple); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        .btn { padding: 8px 15px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; color: white; }
        #inspectModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; }
        .inspect-box { width: 90%; margin: 2% auto; background: var(--card); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="sidebar">
        <h2>a<span style="color:var(--purple)">⌵</span> ADMIN</h2>
        <button class="tab-btn active" onclick="showTab('approvals')">👥 Approvals</button>
        <button class="tab-btn" onclick="showTab('assigning')">📤 Assign Tasks</button>
        <button class="tab-btn" onclick="showTab('tracking')">📊 Workflow</button>
        <button class="tab-btn" onclick="showTab('inspection')">🔍 Inspect Review</button>
    </div>

    <div class="main-content">
        <div id="approvals" class="tab-content active">
            <h1>Coworker Approvals</h1>
            <div class="panel"><table id="userTable"><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div id="assigning" class="tab-content">
            <h1>Task Assignment</h1>
            <div class="panel" style="max-width: 400px;">
                <input type="file" id="adminFile" accept="image/*" style="margin-bottom:10px;">
                <select id="assignToDropdown" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:white;"></select>
                <button class="btn" style="background:var(--purple); width:100%;" onclick="uploadAdminTask()">Send Task</button>
            </div>
        </div>

        <div id="tracking" class="tab-content">
            <h1>Production Tracking</h1>
            <div class="panel"><table id="productionTable"><thead><tr><th>Coworker</th><th>Earnings</th><th>Status</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div id="inspection" class="tab-content">
            <h1>Inspection</h1>
            <div class="panel"><table id="inspectTable"><thead><tr><th>Date</th><th>Worker</th><th>Action</th></tr></thead><tbody></tbody></table></div>
        </div>
    </div>
</div>

<script>
const SB_URL = "https://qhftvfatzsogxbbqzxry.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    refreshAdmin();
}

async function refreshAdmin() {
    const { data: users } = await supabase.from('ant_users').select('*');
    const { data: tasks } = await supabase.from('ant_tasks').select('*');
    if (!users) return;

    // Approvals Table
    document.getElementById("userTable").querySelector("tbody").innerHTML = users.map(u => `
        <tr><td>${u.name}</td><td>${u.email}</td><td>${u.status}</td>
        <td>${u.status==='pending' ? `<button class="btn" style="background:var(--success)" onclick="updateStatus('${u.email}','approved')">Approve</button>` : ''}</td></tr>
    `).join('');

    // Dropdown
    document.getElementById("assignToDropdown").innerHTML = users.filter(u=>u.status==='approved').map(u=>`<option value="${u.email}">${u.name}</option>`).join('');
}

async function updateStatus(email, status) {
    await supabase.from('ant_users').update({ status }).eq('email', email);
    refreshAdmin();
}

async function uploadAdminTask() {
    const file = document.getElementById("adminFile").files[0];
    const email = document.getElementById("assignToDropdown").value;
    const reader = new FileReader();
    reader.onload = async (e) => {
        await supabase.from('ant_tasks').insert([{ id: Date.now(), imgData: e.target.result, assignedTo: email }]);
        alert("Task Sent!");
    };
    reader.readAsDataURL(file);
}

window.onload = refreshAdmin;
</script>
</body>
</html>
