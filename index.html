<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Antana Labeler - Production</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ===== LOGIN PAGE (UNCHANGED) ===== */
#homepage{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  z-index:1000;
}
#homeLeft{
  flex:1;
  background:url('https://images.unsplash.com/photo-1555949963-aa79dcee981c?q=80&w=2070') center/cover no-repeat;
}
#homeRight{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#0d6efd;
}
#homeRight h1{ margin-bottom:30px; }

input{
  padding:10px;
  margin:6px;
  width:250px;
  border-radius:5px;
  border:none;
}

/* ===== DARK MODERN DASHBOARD ===== */
#leftPanel{
  width:260px;
  background:#151515;
  border-right:1px solid #2c2c2c;
  padding:15px;
  overflow-y:auto;
}

#main{
  flex:4;
  display:flex;
  flex-direction:column;
}

#toolbar{
  padding:12px 20px;
  background:#121212;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #2a2a2a;
}

#toolbarLeft{
  display:flex;
  align-items:center;
  gap:20px;
}

#toolbarRight{
  display:flex;
  align-items:center;
  gap:10px;
}

#workspace{
  flex:1;
  background:#000;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  background:black;
  cursor:crosshair;
}

/* ===== RIGHT PANEL ===== */
#rightPanel{
  width:280px;
  background:#151515;
  border-left:1px solid #2c2c2c;
  padding:15px;
  overflow-y:auto;
}

/* ===== IMAGE ITEMS ===== */
.imageItem{
  padding:8px;
  cursor:pointer;
  background:#1f1f1f;
  margin-bottom:6px;
  border-radius:6px;
  transition:0.2s;
}
.imageItem:hover{ background:#292929; }
.imageItem.active{background:#7b2ff7;}
.imageItem.complete{background:#28a745;}

/* ===== BUTTONS ===== */
button{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:500;
}
.green{background:#7b2ff7;color:white;}
.red{background:#dc3545;color:white;}
.gray{background:#444;color:white;}
.blue{background:#0d6efd;color:white;}

/* ===== PROFILE ===== */
#profile{
  position:relative;
  cursor:pointer;
}
#profileBox{
  position:absolute;
  right:0;
  top:35px;
  background:#1f1f1f;
  padding:12px;
  width:220px;
  border-radius:8px;
  display:none;
  border:1px solid #333;
}
#profileBox button{
  width:100%;
  margin-top:6px;
}

/* Greeting */
#greeting{
  position:absolute;
  top:10px;
  left:20px;
  font-size:14px;
  font-weight:bold;
}

#labelPopup{
  position:fixed;
  background:#222;
  padding:10px;
  border:2px solid #555;
  display:none;
  z-index:1000;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="homepage">
  <div id="homeLeft"></div>
  <div id="homeRight">
    <h1>Data Labeler Login</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="text" id="loginName" placeholder="Full Name (new users)">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="green" onclick="login()">Login / Sign Up</button>
  </div>
</div>

<div id="greeting"></div>

<!-- LEFT PANEL -->
<div id="leftPanel">
  <h3>Images</h3>
  <input type="file" id="imageLoader" multiple accept="image/*"><br><br>
  <div id="imageList"></div>
</div>

<!-- MAIN -->
<div id="main">

  <div id="toolbar">

    <!-- LEFT -->
    <div id="toolbarLeft">
      <h2>Antana Labeler - Production</h2>
    </div>

    <!-- RIGHT -->
    <div id="toolbarRight">
      <button class="green" onclick="markComplete()">✔</button>
      <button class="gray" onclick="clearCurrent()">🧹</button>
      <button class="red" onclick="deleteSelected()">🗑</button>

      <div id="profile" onclick="toggleProfile()">
        👤
        <div id="profileBox">
          <div id="coworkerDetails"></div>
          <button class="gray" onclick="logout()">Logout</button>
          <button class="red" onclick="deleteAccount()">Delete Account</button>
        </div>
      </div>
    </div>

  </div>

  <div id="workspace">
    <canvas id="canvas"></canvas>
  </div>

</div>

<div id="rightPanel">
  <h3>Annotations</h3>
  <div id="annotationList"></div>
</div>

<div id="labelPopup">
  <select id="labelSelect">
    <option>Car</option>
    <option>Bus</option>
    <option>Truck</option>
    <option>Pedestrian</option>
    <option>Train</option>
  </select>
  <button onclick="applyLabel()">Apply</button>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const imageLoader=document.getElementById("imageLoader");
const imageList=document.getElementById("imageList");
const annotationList=document.getElementById("annotationList");
const popup=document.getElementById("labelPopup");
const labelSelect=document.getElementById("labelSelect");
const loginEmail=document.getElementById("loginEmail");
const loginPass=document.getElementById("loginPass");
const loginName=document.getElementById("loginName");
const homepage=document.getElementById("homepage");
const greetingDiv=document.getElementById("greeting");

let dataset=JSON.parse(localStorage.getItem("dataset"))||{};
let imagesMeta=JSON.parse(localStorage.getItem("imagesMeta"))||{};
let users=JSON.parse(localStorage.getItem("users"))||[];
let currentImage=null;
let currentUser=null;
let img=new Image();

let scale=1;

/* SAVE */
function saveData(){
  localStorage.setItem("dataset",JSON.stringify(dataset));
  localStorage.setItem("imagesMeta",JSON.stringify(imagesMeta));
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("currentUser",JSON.stringify(currentUser));
}

/* LOGIN */
function login(){
  const email=loginEmail.value.trim();
  const pass=loginPass.value.trim();
  const name=loginName.value.trim();
  if(!email||!pass) return alert("Email & password required");

  let user=users.find(u=>u.email===email);
  if(user){
      if(user.pass!==pass) return alert("Wrong password");
      currentUser=user;
  } else {
      if(!name) return alert("Enter full name for new account");
      currentUser={name,email,pass};
      users.push(currentUser);
  }
  saveData();
  homepage.style.display="none";
  greetingDiv.innerText="Welcome, "+currentUser.name;
  document.getElementById("coworkerDetails").innerHTML=
    "<strong>"+currentUser.name+"</strong><br>"+currentUser.email;
  renderImageList();
}

/* PROFILE */
function toggleProfile(){
  const box=document.getElementById("profileBox");
  box.style.display=box.style.display==="block"?"none":"block";
}

function logout(){
  currentUser=null;
  localStorage.removeItem("currentUser");
  homepage.style.display="flex";
  greetingDiv.innerText="";
}

function deleteAccount(){
  users=users.filter(u=>u.email!==currentUser.email);
  saveData();
  logout();
}

/* ZOOM */
canvas.addEventListener("wheel",function(e){
  e.preventDefault();
  const zoom=e.deltaY<0?1.1:0.9;
  scale*=zoom;
  redraw();
});

function redraw(){
  ctx.setTransform(scale,0,0,scale,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(img.src) ctx.drawImage(img,0,0);
}

/* IMAGE */
imageLoader.addEventListener("change",e=>{
  if(!currentUser) return alert("Login required");
  [...e.target.files].forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
          imagesMeta[file.name]={src:ev.target.result,complete:false};
          dataset[file.name]=dataset[file.name]||[];
          saveData();
          renderImageList();
      };
      reader.readAsDataURL(file);
  });
});

function renderImageList(){
  imageList.innerHTML="";
  for(let name in imagesMeta){
      const div=document.createElement("div");
      div.className="imageItem";
      div.innerText=name;
      if(currentImage===name) div.classList.add("active");
      if(imagesMeta[name].complete) div.classList.add("complete");
      div.onclick=()=>loadImage(name);
      imageList.appendChild(div);
  }
}

function loadImage(name){
  currentImage=name;
  img.src=imagesMeta[name].src;
  img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    scale=1;
    redraw();
  };
}

function applyLabel(){
  if(!currentUser || !currentImage) return;
  dataset[currentImage][0]={label:labelSelect.value};
  popup.style.display="none";
  saveData();
}

function deleteSelected(){
  if(!currentImage) return;
  dataset[currentImage]=[];
  saveData();
}

function clearCurrent(){
  if(!currentImage) return;
  dataset[currentImage]=[];
  saveData();
}

function markComplete(){
  if(!currentImage) return;
  imagesMeta[currentImage].complete=true;
  saveData();
  renderImageList();
}

currentUser=JSON.parse(localStorage.getItem("currentUser"));
if(currentUser){
  homepage.style.display="none";
  greetingDiv.innerText="Welcome, "+currentUser.name;
  document.getElementById("coworkerDetails").innerHTML=
    "<strong>"+currentUser.name+"</strong><br>"+currentUser.email;
  renderImageList();
}
</script>

</body>
</html>
