<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Antana Labeler - Production</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* LOGIN */
#homepage{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  z-index:1000;
}

/* ✅ LEFT SIDE IMAGE (2D BOX DRAWING) */
#homeLeft{
  flex:1;
  background:url('https://images.unsplash.com/photo-1603570419888-2c3b5c7c8a0d?q=80&w=2070') center/cover no-repeat;
}

/* ✅ RIGHT SIDE LOGIN */
#homeRight{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#0d6efd;
}

#homeRight h1{
  margin-bottom:30px;
}

input{
  padding:10px;
  margin:6px;
  width:250px;
  border-radius:5px;
  border:none;
}

button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}
.green{background:#28a745;color:white;}
.red{background:#dc3545;color:white;}
.gray{background:#6c757d;color:white;}
.blue{background:#007bff;color:white;}

/* WORKSPACE */
#leftPanel{
  width:250px;
  background:#181818;
  border-right:2px solid #333;
  overflow-y:auto;
  padding:10px;
}
#main{flex:4; display:flex; flex-direction:column;}
#toolbar{
  padding:10px;
  background:#1e1e1e;
  display:flex;
  align-items:center;
  gap:10px;
}
#workspace{
  flex:1;
  background:black;
  position:relative;
  overflow:hidden;
}
canvas{
  display:block;
  background:black;
  cursor:crosshair;
}
#rightPanel{
  width:300px;
  background:#1e1e1e;
  border-left:2px solid #333;
  padding:10px;
  overflow-y:auto;
}
.imageItem{
  padding:5px;
  cursor:pointer;
  background:#2a2a2a;
  margin-bottom:5px;
}
.imageItem.active{background:#007bff;}
.imageItem.complete{background:#28a745;}

#greeting{
  position:absolute;
  top:10px;
  left:20px;
  font-size:15px;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="homepage">
  <div id="homeLeft"></div>
  <div id="homeRight">
    <h1>Data Labeler Login</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="text" id="loginName" placeholder="Full Name (new users)">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="green" onclick="login()">Login / Sign Up</button>
    <button class="gray" onclick="forgotPassword()">Forgot Password?</button>
  </div>
</div>

<div id="greeting"></div>

<div id="leftPanel">
  <h3>Images</h3>
  <input type="file" id="imageLoader" multiple accept="image/*"><br><br>
  <div id="imageList"></div>
  <hr>
  <button class="red" onclick="deleteAccount()">Delete My Account</button>
  <button class="gray" onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="toolbar">
    <h2 style="flex:1;">Antana Labeler - Production</h2>
    <button class="green" onclick="markComplete()">Mark Complete</button>
    <button class="red" onclick="deleteSelected()">Delete</button>
    <button class="gray" onclick="clearCurrent()">Clear Image</button>
  </div>
  <div id="workspace">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="rightPanel">
  <h3>Annotations</h3>
  <div id="annotationList"></div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const imageLoader=document.getElementById("imageLoader");
const imageList=document.getElementById("imageList");
const loginEmail=document.getElementById("loginEmail");
const loginPass=document.getElementById("loginPass");
const loginName=document.getElementById("loginName");
const homepage=document.getElementById("homepage");
const greetingDiv=document.getElementById("greeting");

let dataset=JSON.parse(localStorage.getItem("dataset"))||{};
let imagesMeta=JSON.parse(localStorage.getItem("imagesMeta"))||{};
let users=JSON.parse(localStorage.getItem("users"))||[];
let currentUser=null;
let currentImage=null;
let img=new Image();

function saveData(){
  localStorage.setItem("dataset",JSON.stringify(dataset));
  localStorage.setItem("imagesMeta",JSON.stringify(imagesMeta));
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("currentUser",JSON.stringify(currentUser));
}

function getGreeting(name){
  const hour=new Date().getHours();
  if(hour<12) return "Good Morning, "+name;
  if(hour<18) return "Good Afternoon, "+name;
  return "Good Evening, "+name;
}

function login(){
  const email=loginEmail.value.trim();
  const pass=loginPass.value.trim();
  const name=loginName.value.trim();
  if(!email||!pass) return alert("Email & password required");

  let user=users.find(u=>u.email===email);
  if(user){
      if(user.pass!==pass) return alert("Wrong password");
      currentUser=user;
  } else {
      if(!name) return alert("Enter full name");
      currentUser={name,email,pass};
      users.push(currentUser);
  }

  saveData();
  homepage.style.display="none";
  greetingDiv.innerText=getGreeting(currentUser.name);
  renderImageList();
}

function forgotPassword(){
  const email = loginEmail.value.trim();
  if(!email) return alert("Enter your email first");

  const user = users.find(u=>u.email===email);
  if(!user) return alert("No account found with this email");

  const newPass = prompt("Enter your NEW password");
  if(!newPass) return alert("Password reset cancelled");

  const confirmPass = prompt("Confirm your NEW password");
  if(newPass !== confirmPass) return alert("Passwords do not match");

  user.pass = newPass;
  saveData();
  alert("Password successfully reset! You can now login.");
}

function logout(){
  currentUser=null;
  localStorage.removeItem("currentUser");
  homepage.style.display="flex";
  greetingDiv.innerText="";
}

function deleteAccount(){
  if(!currentUser) return;
  users=users.filter(u=>u.email!==currentUser.email);
  localStorage.setItem("users",JSON.stringify(users));
  logout();
}

imageLoader.addEventListener("change",e=>{
  if(!currentUser) return alert("Login required");
  [...e.target.files].forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
          imagesMeta[file.name]={src:ev.target.result,complete:false};
          dataset[file.name]=dataset[file.name]||[];
          saveData();
          renderImageList();
      };
      reader.readAsDataURL(file);
  });
});

function renderImageList(){
  imageList.innerHTML="";
  for(let name in imagesMeta){
      const div=document.createElement("div");
      div.className="imageItem";
      div.innerText=name;
      div.onclick=()=>loadImage(name);
      imageList.appendChild(div);
  }
}

function loadImage(name){
  currentImage=name;
  img.src=imagesMeta[name].src;
  img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);
  };
}

function deleteSelected(){ if(!currentUser||!currentImage)return; dataset[currentImage]=[]; saveData();}
function clearCurrent(){ if(!currentUser||!currentImage)return; dataset[currentImage]=[]; saveData();}
function markComplete(){ if(!currentUser||!currentImage)return; imagesMeta[currentImage].complete=true; saveData();}

currentUser=JSON.parse(localStorage.getItem("currentUser"));
if(currentUser){
  homepage.style.display="none";
  greetingDiv.innerText=getGreeting(currentUser.name);
  renderImageList();
}
</script>
</body>
</html>
