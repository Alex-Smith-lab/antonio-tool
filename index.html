<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antana Labeler - Production</title>
<style>
:root{
--bg:#0b0b0b;
--card:#161616;
--purple:#7b2ff7;
--blue:#0d6efd;
--white:#fff;
--dim:#999;
}

body,html{
margin:0;
padding:0;
font-family:Segoe UI,sans-serif;
background:var(--bg);
color:var(--white);
height:100vh;
overflow:hidden; /* Prevent body scroll during annotation */
font-size:14px;
user-select: none;
}

/* LOGIN */
#loginPage{
display:flex;
height:100vh;
position:fixed;
width:100%;
z-index:2000;
background:#000;
}
#loginLeft{flex:1.2;background:url('https://images.unsplash.com/photo-1542281286-9e0a16bb7366?q=80&w=2070') center/cover;}
#loginRight{flex:.8;background:var(--blue);display:flex;align-items:center;justify-content:center;}
.login-box{width:300px;}
input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:4px;color: #000;}
.login-btn{width:100%;padding:10px;background:white;color:var(--blue);border:none;font-weight:bold;cursor:pointer;border-radius:4px;}

/* NAV */
#topNav{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:1000;
border-bottom:1px solid #222;
}
.nav-right {
    display: flex;
    align-items: center;
    gap: 15px;
}
#paymentDisplay {
    color: #00c853;
    font-weight: bold;
    font-family: monospace;
    font-size: 16px;
}
.profile-container{position:relative;cursor:pointer;}
#profileDropdown{
position:absolute;
right:0;
top:40px;
background:#111;
border:1px solid #333;
padding:10px;
display:none;
border-radius: 8px;
z-index: 1001;
}

/* SPREADSHEET / EARNINGS MODAL */
#earningsPage {
    display: none;
    position: fixed;
    top: 50px;
    left: 0;
    width: 100%;
    height: calc(100% - 50px);
    background: var(--bg);
    z-index: 1500;
    padding: 30px;
    box-sizing: border-box;
    overflow-y: auto;
}
.spreadsheet {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    margin-top: 20px;
}
.spreadsheet th, .spreadsheet td {
    border: 1px solid #333;
    padding: 12px;
    text-align: left;
}
.spreadsheet th { background: #222; color: var(--purple); }

/* DASHBOARD */
#dashboard{
margin-top:70px;
padding:0 10%;
overflow-y: auto;
height: calc(100vh - 70px);
}

.work-card{
    background:var(--card);
    padding:15px;
    width:240px;
    border-radius:12px;
    border: 1px solid #222;
}

.upload-area{
    margin-top:15px;
    border:1.5px dashed #333;
    padding:15px;
    text-align:center;
    cursor:pointer;
    border-radius: 8px;
    display: block;
}

/* WORKSPACE */
#workspacePage{
display:none;
position:fixed;
top:50px;
bottom:20px;
left:0;
right:0;
background:black;
}

#workzone{
position:absolute;
left:0;
right:250px;
top:0;
bottom:0;
overflow:hidden; /* Important: stops image jumping */
cursor: crosshair;
}
canvas { position: absolute; top: 0; left: 0; }

#rightPanel{
position:absolute;
right:0;
top:0;
bottom:0;
width:250px;
background:#111;
border-left:1px solid #222;
padding:10px;
}

#boxControls{
position:absolute;
bottom:20px;
left:20px;
display:flex;
gap:8px;
z-index: 500;
}
.control-btn {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}
.control-btn:hover { background: var(--purple); }

.label-popup{
position:absolute;
background:#111;
border:1px solid #333;
padding:8px;
z-index:2000;
border-radius: 5px;
}

.footer-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:20px;
background:var(--purple);
font-size:9px;
display:flex;
justify-content:space-between;
align-items: center;
padding:0 10px;
}
</style>
</head>
<body onpaste="return false;" oncontextmenu="return false;">

<div id="loginPage">
    <div id="loginLeft"></div>
    <div id="loginRight">
        <div class="login-box">
            <h2>Antana Login</h2>
            <input id="userName" placeholder="Full Name">
            <input id="userEmail" placeholder="Email">
            <input id="userPass" placeholder="Password" type="password">
            <button class="login-btn" onclick="handleLogin()">Sign In</button>
        </div>
    </div>
</div>

<div id="topNav">
    <div class="logo">a<span style="color:var(--purple)">⌵</span> LABELER</div>
    <div class="nav-right">
        <button onclick="toggleEarnings()" class="control-btn" style="background:var(--card)">📊 Earnings</button>
        <div id="paymentDisplay">$0.000</div>
        <div class="profile-container" onclick="toggleProfile()">👤
            <div id="profileDropdown">
                <strong id="displayUserName"></strong><br>
                <small id="displayUserEmail"></small><hr>
                <button onclick="logout()" style="color:red; background:none; border:none; cursor:pointer;">Logout</button>
            </div>
        </div>
    </div>
</div>

<div id="earningsPage">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>My Earnings Statement</h2>
        <button class="control-btn" onclick="toggleEarnings()">Back to Work</button>
    </div>
    <table class="spreadsheet">
        <thead>
            <tr>
                <th>Date/Time</th>
                <th>Task Type</th>
                <th>Amount ($)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="earningsTableBody">
            </tbody>
    </table>
</div>

<div id="dashboard">
    <h2 id="greetingText">Welcome!</h2>
    <div class="work-card">
        <strong>Upload Dataset</strong>
        <label class="upload-area">
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="updateFileName(this)">
            <span id="fileLabelText">Click to select image</span>
        </label>
        <button class="continue-btn" onclick="startWork()">Start Annotating</button>
    </div>
</div>

<div id="workspacePage">
    <div id="workzone">
        <canvas id="canvas"></canvas>
    </div>

    <div id="boxControls">
        <button class="control-btn" onclick="enableDraw()">+ Add Box</button>
        <button class="control-btn" onclick="deleteLastBox()">- Delete Last</button>
        <button class="control-btn" onclick="undoLastBox()">⮪ Undo</button>
        <div style="width:2px; background:#444; margin:0 5px;"></div>
        <button class="control-btn" onclick="adjustZoom(1.2)">Zoom In</button>
        <button class="control-btn" onclick="adjustZoom(0.8)">Zoom Out</button>
        <button class="control-btn" onclick="resetZoom()">1:1</button>
    </div>

    <div id="rightPanel">
        <button class="complete-btn" onclick="completeTask()" style="width:100%; margin-bottom:20px;">Complete Task</button>
        <h3>Annotations</h3>
        <div id="annotationList"></div>
    </div>
</div>

<div class="footer-bar">
    <span id="footerLeft">SYSTEM ACTIVE</span>
    <span id="footerRight">V 2.0.4 [STABLE]</span>
</div>

<script>
let currentUser=null;
let canvas,ctx,img=new Image();
let boxes=[],history=[],drawing=false,dragging=false,startX,startY,drawMode=false;
let scale=1,originX=0,originY=0;
let balance = parseFloat(localStorage.getItem("antana_balance")) || 0;
let earningsLog = JSON.parse(localStorage.getItem("antana_logs")) || [];

// Prevent Browser Defaults (Fixes jumping/scrolling)
window.addEventListener('wheel', e => { if(drawMode || dragging) e.preventDefault(); }, {passive:false});

function updateBalance(amount, type) {
    balance += amount;
    const log = {
        time: new Date().toLocaleString(),
        task: type,
        amt: amount.toFixed(4)
    };
    earningsLog.unshift(log);
    localStorage.setItem("antana_balance", balance.toFixed(4));
    localStorage.setItem("antana_logs", JSON.stringify(earningsLog));
    document.getElementById("paymentDisplay").innerText = "$" + balance.toFixed(3);
    renderSpreadsheet();
}

function renderSpreadsheet() {
    const body = document.getElementById("earningsTableBody");
    body.innerHTML = earningsLog.map(l => `
        <tr>
            <td>${l.time}</td>
            <td>${l.task}</td>
            <td style="color:#00c853">+$${l.amt}</td>
            <td>Paid</td>
        </tr>
    `).join('');
}

function handleLogin(){
    const name = document.getElementById("userName").value;
    if(!name) return alert("Enter Name");
    currentUser = {name: name, email: document.getElementById("userEmail").value};
    localStorage.setItem("antana_user", JSON.stringify(currentUser));
    location.reload();
}

function initDashboard(){
    let saved = localStorage.getItem("antana_user");
    document.getElementById("paymentDisplay").innerText = "$" + balance.toFixed(3);
    if(saved){
        currentUser = JSON.parse(saved);
        document.getElementById("loginPage").style.display="none";
        document.getElementById("displayUserName").innerText = currentUser.name;
        document.getElementById("greetingText").innerText = "Welcome, " + currentUser.name + "!";
        renderSpreadsheet();
    }
}

function toggleEarnings() {
    const p = document.getElementById("earningsPage");
    p.style.display = p.style.display === "block" ? "none" : "block";
}

function startWork(){
    const file = document.getElementById("fileInput").files[0];
    if(!file) return alert("Upload image");
    document.getElementById("dashboard").style.display="none";
    document.getElementById("workspacePage").style.display="block";
    canvas = document.getElementById("canvas");
    ctx = canvas.getContext("2d");
    let reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.readAsDataURL(file);
    img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        resetZoom();
        initCanvasEvents();
    };
}

function initCanvasEvents(){
    canvas.onmousedown = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left - originX) / scale;
        const y = (e.clientY - rect.top - originY) / scale;
        if(drawMode){
            saveHistory();
            startX = x; startY = y; drawing = true;
        } else {
            dragging = true;
        }
    };

    canvas.onmousemove = (e) => {
        if(drawing){
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left - originX) / scale;
            const y = (e.clientY - rect.top - originY) / scale;
            draw();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2/scale;
            ctx.strokeRect(startX, startY, x - startX, y - startY);
        } else if(dragging){
            originX += e.movementX;
            originY += e.movementY;
            draw();
        }
    };

    canvas.onmouseup = (e) => {
        if(drawing){
            drawing = false;
            const rect = canvas.getBoundingClientRect();
            let x = (e.clientX - rect.left - originX) / scale;
            let y = (e.clientY - rect.top - originY) / scale;
            let box = { x: Math.min(startX, x), y: Math.min(startY, y), 
                        w: Math.abs(x - startX), h: Math.abs(y - startY), 
                        label: "", color: "lime", id: Date.now() };
            if(box.w > 5){
                boxes.push(box);
                showLabelPopup(e.pageX, e.pageY, box);
                updateBalance(0.010, "BBox Annotation");
            }
            drawMode = false;
            draw();
        }
        dragging = false;
    };

    // WHEEL ZOOM
    canvas.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        adjustZoom(delta);
    };
}

function adjustZoom(factor){
    scale *= factor;
    scale = Math.max(0.1, Math.min(scale, 10));
    draw();
}

function resetZoom(){
    scale = 1; originX = 0; originY = 0; draw();
}

function draw(){
    if(!ctx) return;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.translate(originX, originY);
    ctx.scale(scale, scale);
    ctx.drawImage(img,0,0);
    boxes.forEach(b=>{
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 2/scale;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = b.color;
        ctx.font = `${12/scale}px Arial`;
        if(b.label) ctx.fillText(b.label, b.x, b.y - (5/scale));
    });
}

function showLabelPopup(x,y,box){
    let pop = document.createElement("div");
    pop.className = "label-popup";
    pop.style.left = x + "px"; pop.style.top = y + "px";
    pop.innerHTML = `
        <select id="pSel" style="background:#222; color:white; border:1px solid #444; padding:5px;">
            <option value="">Select Label</option>
            <option value="Car" data-color="lime">Car</option>
            <option value="Truck" data-color="cyan">Truck</option>
            <option value="Human" data-color="yellow">Human</option>
        </select>
    `;
    document.body.appendChild(pop);
    const s = document.getElementById("pSel");
    s.focus();
    s.onchange = () => {
        box.label = s.value;
        box.color = s.options[s.selectedIndex].dataset.color;
        updateBalance(0.002, "Label Refinement");
        pop.remove();
        draw();
        updateAnnotationList();
    };
}

function enableDraw(){ drawMode = true; }
function saveHistory(){ history.push(JSON.stringify(boxes)); }
function undoLastBox(){ if(history.length){ boxes = JSON.parse(history.pop()); draw(); updateAnnotationList(); } }
function deleteLastBox(){ boxes.pop(); draw(); updateAnnotationList(); }

function updateAnnotationList(){
    const list = document.getElementById("annotationList");
    list.innerHTML = boxes.map(b => `<div style="padding:5px; border-bottom:1px solid #222; font-size:11px;">• ${b.label || 'New Box'}</div>`).join('');
}

function completeTask(){
    if(confirm("Submit work and earn?")){
        updateBalance(0.05, "Task Completion Bonus");
        location.reload();
    }
}

function toggleProfile(){
    let d = document.getElementById("profileDropdown");
    d.style.display = d.style.display === "block" ? "none" : "block";
}

function updateFileName(input) {
    document.getElementById('fileLabelText').innerText = input.files[0].name;
}

window.onload = initDashboard;
</script>
</body>
</html>
