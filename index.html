<!DOCTYPE html>
<html>
<head>
    <title>Request Access - Antony Mbali Labeling</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161616; padding: 30px; border-radius: 12px; width: 320px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #7b2ff7; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Request Access</h2>
        <p style="color:#888; font-size: 14px;">Enter your details to join the team</p>
        <input type="text" id="newName" placeholder="Full Name">
        <input type="email" id="newEmail" placeholder="Email Address">
        <button onclick="sendRequest()">Submit Request</button>
    </div>

    <script>
        const SB_URL = "https://qhftvfatzsogxbbqzxry.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        async function sendRequest() {
            const name = document.getElementById('newName').value;
            const email = document.getElementById('newEmail').value;
            
            if(!name || !email) return alert("Fill all fields");

            const { error } = await supabase.from('ant_users').insert([{ 
                name: name, 
                email: email, 
                status: 'pending',
                balance: 0 
            }]);
            
            if (error) alert("Error: " + error.message);
            else alert("Request sent! Antony will review your account soon.");
        }
    </script>
</body>
</html>
