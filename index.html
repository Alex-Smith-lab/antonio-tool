<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antana Labeler - Production</title>

<style>
:root{
--bg:#0b0b0b;
--card:#161616;
--purple:#7b2ff7;
--blue:#0d6efd;
--white:#fff;
--dim:#999;
}

body,html{
margin:0;
padding:0;
font-family:Segoe UI;
background:var(--bg);
color:white;
height:100vh;
overflow:hidden;
}

/* LOGIN */
#loginPage{
display:flex;
height:100vh;
position:fixed;
width:100%;
z-index:2000;
background:#000;
}
#loginLeft{flex:1.2;background:url('https://images.unsplash.com/photo-1542281286-9e0a16bb7366?q=80&w=2070') center/cover;}
#loginRight{flex:.8;background:var(--blue);display:flex;align-items:center;justify-content:center;}
.login-box{width:300px;}
input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:4px;}
.login-btn{width:100%;padding:10px;background:white;color:var(--blue);border:none;font-weight:bold;cursor:pointer;border-radius:4px;}

/* NAV */
#topNav{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:1000;
border-bottom:1px solid #222;
}
.profile-container{position:relative;cursor:pointer;}
#profileDropdown{
position:absolute;
right:0;
top:40px;
background:#111;
border:1px solid #333;
padding:10px;
display:none;
}

/* DASHBOARD */
#dashboard{
margin-top:70px;
padding:20px;
}
.work-card{background:var(--card);padding:20px;width:280px;border-radius:8px;}
.upload-area{margin-top:10px;border:1px dashed #333;padding:15px;text-align:center;cursor:pointer;}
.continue-btn{margin-top:15px;background:var(--purple);color:white;border:none;padding:10px;width:100%;cursor:pointer;border-radius:6px;}

/* WORKSPACE */
#workspacePage{
display:none;
position:fixed;
top:50px;
bottom:20px;
left:0;
right:0;
background:black;
}

#leftPanel{
position:absolute;
left:0;
top:0;
bottom:0;
width:250px;
background:#111;
border-right:1px solid #222;
overflow:auto;
padding:10px;
z-index:100;
}
#leftPanel h3{margin-top:0;}
#hidePanel{
position:absolute;
right:5px;
top:5px;
cursor:pointer;
color:red;
}

#showPanelBtn{
position:absolute;
left:5px;
top:5px;
z-index:150;
background:#222;
border:none;
color:white;
padding:4px 8px;
cursor:pointer;
display:none;
}

#workspaceTop{
position:absolute;
top:10px;
left:10px;
z-index:200;
}
.complete-btn{
background:#00c853;
border:none;
padding:6px 14px;
color:white;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

#addBoxBtn{
position:absolute;
bottom:10px;
left:10px;
font-size:11px;
background:#222;
border:none;
color:white;
padding:5px 8px;
cursor:pointer;
}

#workzone{
position:absolute;
left:250px;
right:0;
top:0;
bottom:0;
overflow:hidden;
cursor:grab;
}

canvas{position:absolute;top:0;left:0;}

/* FOOTER */
.footer-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:20px;
background:var(--purple);
font-size:9px;
display:flex;
justify-content:space-between;
padding:3px 10px;
font-weight:bold;
}

/* POPUP */
.label-popup{
position:absolute;
background:#111;
border:1px solid #333;
padding:5px;
z-index:2000;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
<div id="loginLeft"></div>
<div id="loginRight">
<div class="login-box">
<h2>Antana Login</h2>
<input id="userName" placeholder="Full Name">
<input id="userEmail" placeholder="Email">
<input id="userPass" placeholder="Password" type="password">
<button class="login-btn" onclick="handleLogin()">Sign In</button>
</div>
</div>
</div>

<!-- NAV -->
<div id="topNav">
<div></div>
<div class="profile-container" onclick="toggleProfile()">👤
<div id="profileDropdown">
<strong id="displayUserName"></strong><br>
<small id="displayUserEmail"></small><hr>
<button onclick="logout()">Logout</button>
</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Upload Dataset</h2>
<div class="work-card">
<label class="upload-area">
<input type="file" id="fileInput" accept="image/*">
📁 Select Image
</label>
<button class="continue-btn" onclick="startWork()">Continue →</button>
</div>
</div>

<!-- WORKSPACE -->
<div id="workspacePage">
<div id="leftPanel">
<span id="hidePanel" onclick="hidePanel()">❌</span>
<h3>Annotations</h3>
<div id="annotationList"></div>
</div>

<button id="showPanelBtn" onclick="showPanel()">☰</button>

<div id="workspaceTop">
<button class="complete-btn" onclick="completeTask()">✔ Complete</button>
</div>

<button id="addBoxBtn" onclick="enableDraw()">+ Add Box</button>

<div id="workzone">
<canvas id="canvas"></canvas>
</div>
</div>

<div class="footer-bar">
<span id="footerLeft"></span>
<span id="footerRight"></span>
</div>

<script>
let currentUser=null;
let canvas,ctx,img=new Image();
let boxes=[];
let drawingMode=false;
let startX,startY;
let scale=1,originX=0,originY=0;

/* LOGIN */
function handleLogin(){
const name=userName.value;
const email=userEmail.value;
if(!name||!email)return alert("Fill all");
currentUser={name,email};
localStorage.setItem("antana_user",JSON.stringify(currentUser));
initDashboard();
}
function initDashboard(){
let saved=localStorage.getItem("antana_user");
if(saved){
currentUser=JSON.parse(saved);
loginPage.style.display="none";
displayUserName.innerText=currentUser.name;
displayUserEmail.innerText=currentUser.email;
footerLeft.innerText="COWORKER: "+currentUser.name;
footerRight.innerText="COWORKER: "+currentUser.name;
}
}
function toggleProfile(){
profileDropdown.style.display=profileDropdown.style.display==="block"?"none":"block";
}
function logout(){localStorage.clear();location.reload();}

/* WORKSPACE */
function startWork(){
const file=fileInput.files[0];
if(!file)return alert("Upload first");
dashboard.style.display="none";
workspacePage.style.display="block";

canvas=document.getElementById("canvas");
ctx=canvas.getContext("2d");

let reader=new FileReader();
reader.onload=e=>{
img.src=e.target.result;
localStorage.setItem("antana_image",img.src);
};
reader.readAsDataURL(file);

img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
draw();
};

initCanvas();
}

/* CANVAS */
function initCanvas(){
canvas.onmousedown=e=>{
if(!drawingMode)return;
const rect=canvas.getBoundingClientRect();
startX=(e.clientX-rect.left-originX)/scale;
startY=(e.clientY-rect.top-originY)/scale;
canvas.onmouseup=ev=>{
const x=(ev.clientX-rect.left-originX)/scale;
const y=(ev.clientY-rect.top-originY)/scale;
let box={x:startX,y:startY,w:x-startX,h:y-startY,label:null};
boxes.push(box);
saveState();
showPopup(ev.pageX,ev.pageY,box);
drawingMode=false;
};
};
}

function draw(){
ctx.setTransform(scale,0,0,scale,originX,originY);
ctx.clearRect(-originX/scale,-originY/scale,canvas.width/scale,canvas.height/scale);
ctx.drawImage(img,0,0);
boxes.forEach(b=>{
ctx.strokeStyle="lime";
ctx.strokeRect(b.x,b.y,b.w,b.h);
});
updateList();
}

function enableDraw(){drawingMode=true;}

function showPopup(x,y,box){
let pop=document.createElement("div");
pop.className="label-popup";
pop.style.left=x+"px";
pop.style.top=y+"px";
pop.innerHTML=`
<select>
<option>Select</option>
<option>Car</option>
<option>Bus</option>
<option>Truck</option>
<option>Pedestrian</option>
</select>
<button onclick="this.parentElement.remove()">Delete</button>
`;
document.body.appendChild(pop);
pop.querySelector("select").onchange=function(){
box.label=this.value;
saveState();
pop.remove();
draw();
};
}

/* PANEL */
function updateList(){
annotationList.innerHTML="";
boxes.forEach((b,i)=>{
annotationList.innerHTML+=`<div>${i+1}. ${b.label||"Unlabeled"}</div>`;
});
}
function hidePanel(){
leftPanel.style.display="none";
workzone.style.left="0";
showPanelBtn.style.display="block";
}
function showPanel(){
leftPanel.style.display="block";
workzone.style.left="250px";
showPanelBtn.style.display="none";
}

/* SAVE STATE */
function saveState(){
localStorage.setItem("antana_boxes",JSON.stringify(boxes));
}
function loadState(){
let imgData=localStorage.getItem("antana_image");
let savedBoxes=localStorage.getItem("antana_boxes");
if(imgData){
dashboard.style.display="none";
workspacePage.style.display="block";
img.src=imgData;
img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
draw();
};
}
if(savedBoxes)boxes=JSON.parse(savedBoxes);
}

/* COMPLETE */
function completeTask(){
localStorage.removeItem("antana_image");
localStorage.removeItem("antana_boxes");
boxes=[];
workspacePage.style.display="none";
dashboard.style.display="block";
}

/* INIT */
window.onload=()=>{
initDashboard();
loadState();
};
</script>
</body>
</html>
