<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Labeler - Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --purple: #7b2ff7; --bg: #0b0b0b; --card: #161616; --border: #333; --blue: #007bff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        #dashboard { padding: 100px 60px; display: none; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .batch-card { background: var(--purple); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .status-badge { background: white; color: black; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .start-work-btn { width: 100%; background: white; color: var(--purple); padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        #workspacePage { display: none; position: fixed; inset: 0; background: #050505; z-index: 200; }
        #workzone { position: absolute; left: 0; top: 0; right: 350px; bottom: 0; cursor: crosshair; overflow: hidden; }
        #sidePanel { position: absolute; right: 0; top: 0; width: 350px; bottom: 0; background: #111; border-left: 1px solid #222; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .anno-item { background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid var(--purple); font-size: 12px; }
        .anno-tools { display: flex; gap: 5px; margin-top: 8px; }
        .tool-btn { background: #333; border: none; color: white; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
        .tool-btn:hover { background: #444; }
        
        .classification-header { background: #222; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; }
        .occ-btn { padding: 5px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 10px; flex: 1; }
    </style>
</head>
<body>

<div id="loginPage" style="text-align: center; padding-top: 100px;">
    <h2>Antony Mbali - Worker Login</h2>
    <input id="userName" placeholder="Full Name" style="padding:10px; margin:5px;">
    <input id="userEmail" placeholder="Email Address" style="padding:10px; margin:5px;">
    <button onclick="handleLogin()" style="padding: 10px 20px; background: var(--blue); color: white; border: none; border-radius: 5px;">Login</button>
</div>

<div id="dashboard">
    <h2 id="greet"></h2>
    <div id="tasks" class="task-grid"></div>
</div>

<div id="workspacePage">
    <div id="workzone"><canvas id="canvas"></canvas></div>
    <div id="sidePanel">
        <div class="classification-header">
            <div style="font-size: 11px; margin-bottom: 8px; color: #888;">MASS CLASSIFICATION (OCCLUSION)</div>
            <div style="display: flex; gap: 5px;">
                <button class="occ-btn" style="background: #28a745; color: white;" onclick="applyMassOcclusion(20)">20%</button>
                <button class="occ-btn" style="background: #ffc107; color: black;" onclick="applyMassOcclusion(60)">60%</button>
                <button class="occ-btn" style="background: #dc3545; color: white;" onclick="applyMassOcclusion(100)">100%</button>
            </div>
        </div>
        
        <div id="annoList" style="flex-grow: 1; overflow-y: auto;"></div>
        
        <button onclick="submitForReview()" style="width:100%; background:var(--blue); color:white; border:none; padding:15px; border-radius:6px; font-weight:bold; cursor:pointer; margin-top:10px;">SUBMIT WORK</button>
        <button onclick="closeWorkspace()" style="width:100%; background:#222; color:white; border:none; padding:10px; border-radius:6px; margin-top:5px; cursor:pointer;">EXIT</button>
    </div>
</div>

<script>
// Logic for task cards showing correct assignment badges
async function showDashboard() {
    // ... Supabase fetch logic ...
    const { data: tasks } = await sb.from("ant_tasks").select("*").eq("assignedto", user.email);
    document.getElementById("tasks").innerHTML = (tasks || []).map(t => {
        // Ensure "Review" status from admin is preserved and not overwritten by "1st Pass"
        const displayStatus = t.review_status === 'review' ? 'Review' : '1st Pass';
        return `
        <div class="batch-card">
            <div style="padding:15px;"><span class="status-badge">${displayStatus}</span></div>
            <div style="padding:15px;"><button class="start-work-btn" onclick="openWork('${t.id}')">Resume Work →</button></div>
        </div>`;
    }).join("");
}

// Global state
let boxes = []; 
let selectedIdx = -1;
let isolatedIdx = -1;

// Mass Classification Tool
function applyMassOcclusion(val) {
    boxes.forEach(b => b.occlusion = val);
    draw();
    updateSidePanel();
    saveProgress();
}

// Side Panel UI with Hide/Isolate
function updateSidePanel() {
    const list = document.getElementById("annoList");
    list.innerHTML = boxes.map((b, i) => `
        <div class="anno-item" style="opacity: ${b.hidden ? 0.5 : 1}; border-color: ${getBoxColor(b.occlusion)}">
            <div style="display:flex; justify-content:space-between;">
                <b>${b.label}</b>
                <span>${b.occlusion || 20}%</span>
            </div>
            <div class="anno-tools">
                <button class="tool-btn" onclick="toggleHide(${i})">${b.hidden ? 'SHOW' : 'HIDE'}</button>
                <button class="tool-btn" onclick="toggleIsolate(${i})">${isolatedIdx === i ? 'UNISOLATE' : 'ISOLATE'}</button>
                <button class="tool-btn" style="color:red;" onclick="deleteBox(${i})">DEL</button>
            </div>
        </div>
    `).join("");
}

function getBoxColor(occ) {
    if (occ == 100) return "#dc3545"; // Red
    if (occ == 60) return "#ffc107";  // Yellow
    return "#28a745";                 // Green (20)
}

function toggleHide(i) { boxes[i].hidden = !boxes[i].hidden; draw(); updateSidePanel(); }
function toggleIsolate(i) { isolatedIdx = (isolatedIdx === i) ? -1 : i; draw(); updateSidePanel(); }

// Canvas Interaction: Double Click to Select Line
canvas.ondblclick = (e) => {
    const mx = (e.clientX - offsetX) / scale;
    const my = (e.clientY - offsetY) / scale;
    const threshold = 10 / scale;

    selectedIdx = boxes.findIndex(b => {
        const onVertical = (Math.abs(mx - b.x) < threshold || Math.abs(mx - (b.x + b.w)) < threshold) && (my >= b.y && my <= b.y + b.h);
        const onHorizontal = (Math.abs(my - b.y) < threshold || Math.abs(my - (b.y + b.h)) < threshold) && (mx >= b.x && mx <= b.x + b.w);
        return onVertical || onHorizontal;
    });
    draw();
};

function draw() {
    // ... canvas clear/setup ...
    boxes.forEach((b, i) => {
        if (b.hidden) return;
        if (isolatedIdx !== -1 && isolatedIdx !== i) return;

        ctx.strokeStyle = (i === selectedIdx) ? "cyan" : getBoxColor(b.occlusion);
        ctx.lineWidth = 2 / scale;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        
        // Render label and occlusion percentage
        ctx.fillStyle = ctx.strokeStyle;
        ctx.fillText(`${b.label} (${b.occlusion || 20}%)`, b.x, b.y - 5/scale);
    });
}
</script>
</body>
</html>
