<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Antonio Tool - Labeling Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#0b0b0b;--purple:#7b2ff7;--card:#161616;}
        body{background:var(--bg); color:white; font-family:sans-serif; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;}
        .login-box { background:var(--card); padding:30px; border-radius:12px; border:1px solid #333; text-align:center; width:320px; }
        .hidden { display: none !important; }
        input { width:100%; padding:12px; margin:10px 0; background:#222; border:1px solid #444; color:white; border-radius:6px; box-sizing:border-box;}
        button { width:100%; padding:12px; background:var(--purple); border:none; color:white; font-weight:bold; cursor:pointer; border-radius:6px; }
        #tool-interface { width:100%; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="login-section" class="login-box">
    <h2>Worker Login</h2>
    <p style="color:#888; font-size:13px;">Enter your email to access tasks</p>
    <input type="email" id="workerEmail" placeholder="yourname@email.com">
    <button onclick="checkAccess()">Open Tool</button>
</div>

<div id="tool-interface" class="hidden">
    <div style="padding:20px; border-bottom:1px solid #222; width:100%; display:flex; justify-content:space-between;">
        <span id="welcomeMsg"></span>
        <button onclick="location.reload()" style="width:auto; padding:5px 15px;">Logout</button>
    </div>
    
    <div id="task-area" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h3 id="status-text">Checking for assigned tasks...</h3>
        <canvas id="labelCanvas" class="hidden" style="border:1px solid var(--purple); max-width:90%;"></canvas>
        <button id="submitBtn" class="hidden" style="margin-top:20px; width:200px;" onclick="submitTask()">Submit Completed Work</button>
    </div>
</div>

<script>
const SB_URL = "https://qhftvfatzsogxbbqzxry.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

let currentWorker = null;
let currentTask = null;

async function checkAccess() {
    const email = document.getElementById('workerEmail').value;
    if(!email) return alert("Enter email");

    // Check if worker exists and is approved
    const { data: user, error } = await supabase.from('ant_users').select('*').eq('email', email).single();

    if (error || !user) {
        alert("Account not found. Please sign up first.");
    } else if (user.status !== 'approved') {
        alert("Access Pending: Antony hasn't approved your account yet.");
    } else {
        // SUCCESS: Show the tool
        currentWorker = user;
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('tool-interface').classList.remove('hidden');
        document.getElementById('welcomeMsg').innerText = "Worker: " + user.name;
        fetchTask();
    }
}

async function fetchTask() {
    const { data: tasks } = await supabase.from('ant_tasks')
        .select('*')
        .eq('assignedTo', currentWorker.email)
        .eq('completed', false)
        .limit(1);

    if (tasks && tasks.length > 0) {
        currentTask = tasks[0];
        document.getElementById('status-text').innerText = "Task Assigned! Start Labeling.";
        displayImage(currentTask.imgData);
    } else {
        document.getElementById('status-text').innerText = "No tasks assigned to you right now. Check back later!";
    }
}

function displayImage(base64) {
    const canvas = document.getElementById('labelCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = base64;
    img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        canvas.classList.remove('hidden');
        document.getElementById('submitBtn').classList.remove('hidden');
    };
}

async function submitTask() {
    if(!confirm("Submit this work to Antony?")) return;
    
    const { error } = await supabase.from('ant_tasks')
        .update({ completed: true, completedBy: currentWorker.name })
        .eq('id', currentTask.id);

    if(!error) {
        alert("Work Submitted!");
        location.reload();
    }
}
</script>
</body>
</html>
