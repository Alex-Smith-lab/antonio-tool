<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antony Mbali - Labeling Workspace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#0b0b0b;
--card:#161616;
--purple:#7b2ff7;
--white:#fff;
--dim:#999;
}

body,html{
margin:0;
padding:0;
font-family:Segoe UI;
background:var(--bg);
color:white;
overflow:hidden;
}

#loginPage,#waitlistPage{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
background:black;
}

input{
width:280px;
padding:10px;
margin:6px;
border:none;
border-radius:4px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

#topNav{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:black;
border-bottom:1px solid #222;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

#dashboard{
margin-top:60px;
padding:40px;
}

.taskCard{
background:#161616;
border:1px solid #333;
padding:15px;
margin-bottom:10px;
}

#workspacePage{
display:none;
position:fixed;
top:50px;
bottom:0;
left:0;
right:0;
background:black;
}

#workzone{
position:absolute;
top:0;
left:0;
bottom:0;
right:250px;
background:#050505;
}

#rightPanel{
position:absolute;
right:0;
top:0;
bottom:0;
width:250px;
background:#111;
border-left:1px solid #222;
padding:15px;
overflow:auto;
}

canvas{
cursor:grab;
}

.annotation{
background:#222;
padding:6px;
margin:5px 0;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div id="loginPage">

<h2>Antony Mbali Login</h2>

<input id="userName" placeholder="Full Name">
<input id="userEmail" placeholder="Email">

<button onclick="handleLogin()" style="background:#0d6efd;color:white;">Login</button>

</div>

<div id="waitlistPage" style="display:none;">

<h2 style="color:#7b2ff7;">Waiting For Approval</h2>

<button onclick="location.reload()">Logout</button>

</div>

<div id="topNav">

<div>a⌵ LABELER</div>

<button onclick="location.reload()" style="background:none;color:red;">Logout</button>

</div>

<div id="dashboard">

<h2 id="greetingText"></h2>

<div id="assignedTasksList"></div>

</div>

<div id="workspacePage">

<div id="workzone">
<canvas id="canvas"></canvas>
</div>

<div id="rightPanel">

<button style="background:#00c853;color:white;width:100%;" onclick="completeTask()">COMPLETE TASK</button>

<h3>Annotations</h3>

<div id="annotationList"></div>

<button onclick="enableDraw()" style="margin-top:10px;background:#7b2ff7;color:white;width:100%;">
Draw Box
</button>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://qhftvfatzsogxbbqzxry.supabase.co",
"public-anon-key"
)

let currentUser=null
let canvas,ctx,img=new Image()

let boxes=[]
let drawMode=false
let drawing=false

let startX,startY

let scale=1
let originX=0
let originY=0

let dragging=false
let dragStartX,dragStartY

let activeTaskId=null

async function handleLogin(){

const name=document.getElementById("userName").value
const email=document.getElementById("userEmail").value

if(!name||!email)return alert("Fill fields")

let {data:user}=await supabase
.from("ant_users")
.select("*")
.eq("email",email)
.single()

if(!user){

await supabase.from("ant_users").insert([{
name:name,
email:email,
status:"pending"
}])

alert("Account submitted. Wait for approval")
return
}

if(user.status!=="approved"){

document.getElementById("loginPage").style.display="none"
document.getElementById("waitlistPage").style.display="flex"

return
}

currentUser=user

document.getElementById("loginPage").style.display="none"

initDashboard()

}

function initDashboard(){

document.getElementById("greetingText").innerText="Welcome "+currentUser.name

loadAssignedTasks()

}

async function loadAssignedTasks(){

const {data:tasks}=await supabase
.from("ant_tasks")
.select("*")
.eq("assignedto",currentUser.email)
.eq("completed",false)

const container=document.getElementById("assignedTasksList")

if(!tasks.length){

container.innerHTML="<h3>No pending tasks</h3>"
return
}

container.innerHTML=tasks.map(t=>`

<div class="taskCard">

TASK ${t.id}

<button onclick="startWork('${t.id}')">Open Workspace</button>

</div>

`).join("")

}

async function startWork(id){

activeTaskId=id

document.getElementById("dashboard").style.display="none"
document.getElementById("workspacePage").style.display="block"

canvas=document.getElementById("canvas")
ctx=canvas.getContext("2d")

const {data}=await supabase
.from("ant_tasks")
.select("*")
.eq("id",id)
.single()

boxes=data.annotations || []

img.src=data.imgdata

img.onload=()=>{

canvas.width=img.width
canvas.height=img.height

draw()

initCanvas()

updateAnnotationList()

}

}

function initCanvas(){

canvas.onwheel=e=>{

e.preventDefault()

const zoom=e.deltaY<0?1.1:0.9

scale*=zoom

draw()

}

canvas.onmousedown=e=>{

if(drawMode){

const rect=canvas.getBoundingClientRect()

startX=(e.clientX-rect.left-originX)/scale
startY=(e.clientY-rect.top-originY)/scale

drawing=true

}else{

dragging=true
dragStartX=e.clientX
dragStartY=e.clientY

canvas.style.cursor="grabbing"

}

}

canvas.onmousemove=e=>{

if(dragging){

originX+=e.clientX-dragStartX
originY+=e.clientY-dragStartY

dragStartX=e.clientX
dragStartY=e.clientY

draw()

}

if(drawing){

const rect=canvas.getBoundingClientRect()

const x=(e.clientX-rect.left-originX)/scale
const y=(e.clientY-rect.top-originY)/scale

draw()

ctx.strokeStyle="lime"
ctx.strokeRect(startX,startY,x-startX,y-startY)

}

}

canvas.onmouseup=e=>{

dragging=false
canvas.style.cursor="grab"

if(!drawing)return

drawing=false
drawMode=false

const rect=canvas.getBoundingClientRect()

const x=(e.clientX-rect.left-originX)/scale
const y=(e.clientY-rect.top-originY)/scale

boxes.push({x:startX,y:startY,w:x-startX,h:y-startY})

saveBoxes()

draw()

updateAnnotationList()

}

}

function draw(){

ctx.setTransform(1,0,0,1,0,0)

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.translate(originX,originY)
ctx.scale(scale,scale)

ctx.drawImage(img,0,0)

boxes.forEach(b=>{

ctx.strokeStyle="lime"
ctx.strokeRect(b.x,b.y,b.w,b.h)

})

}

function enableDraw(){

drawMode=true

}

function updateAnnotationList(){

const list=document.getElementById("annotationList")

list.innerHTML=boxes.map((b,i)=>`

<div class="annotation">

Box ${i+1}

<button onclick="deleteBox(${i})" style="background:red;color:white;">X</button>

</div>

`).join("")

}

function deleteBox(i){

boxes.splice(i,1)

saveBoxes()

draw()

updateAnnotationList()

}

async function saveBoxes(){

await supabase
.from("ant_tasks")
.update({annotations:boxes})
.eq("id",activeTaskId)

}

async function completeTask(){

await supabase
.from("ant_tasks")
.update({
completed:true,
completedby:currentUser.email
})
.eq("id",activeTaskId)

alert("Task submitted")

location.reload()

}

</script>

</body>
</html>
