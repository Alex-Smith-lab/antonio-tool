<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Antana Labeler - Production</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ===== LOGIN HOMEPAGE (FULLSCREEN SPLIT) ===== */
#homepage{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  z-index:1000;
}

/* Left side image */
#homeLeft{
  flex:1;
  background:url('https://images.unsplash.com/photo-1555949963-aa79dcee981c?q=80&w=2070') center/cover no-repeat;
}

/* Right side login */
#homeRight{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#0d6efd;
}

#homeRight h1{
  margin-bottom:30px;
}

input{
  padding:10px;
  margin:6px;
  width:250px;
  border-radius:5px;
  border:none;
}

/* ===== WORKSPACE ===== */

#leftPanel{
  width:250px;
  background:#181818;
  border-right:2px solid #333;
  overflow-y:auto;
  padding:10px;
}
#main{flex:4; display:flex; flex-direction:column;}
#toolbar{
  padding:10px;
  background:#1e1e1e;
  display:flex;
  align-items:center;
  gap:10px;
}
#workspace{
  flex:1;
  background:black;
  position:relative;
  overflow:hidden;
}
canvas{
  display:block;
  background:black;
  cursor:crosshair;
}
#rightPanel{
  width:300px;
  background:#1e1e1e;
  border-left:2px solid #333;
  padding:10px;
  overflow-y:auto;
}
.imageItem{
  padding:5px;
  cursor:pointer;
  background:#2a2a2a;
  margin-bottom:5px;
}
.imageItem.active{background:#007bff;}
.imageItem.complete{background:#28a745;}
.annotation-item{
  font-size:12px;
  padding:4px;
  margin-bottom:4px;
  background:#2c2c2c;
}
button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}
.green{background:#28a745;color:white;}
.red{background:#dc3545;color:white;}
.gray{background:#6c757d;color:white;}
.blue{background:#007bff;color:white;}

/* Greeting top-left */
#greeting{
  position:absolute;
  top:10px;
  left:20px;
  font-size:15px;
  font-weight:bold;
}

#labelPopup{
  position:fixed;
  background:#222;
  padding:10px;
  border:2px solid #555;
  display:none;
  z-index:1000;
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="homepage">
  <div id="homeLeft"></div>

  <div id="homeRight">
    <h1>Data Labeler Login</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="text" id="loginName" placeholder="Full Name (new users)">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="green" onclick="login()">Login / Sign Up</button>
  </div>
</div>

<div id="greeting"></div>

<div id="leftPanel">
  <h3>Images</h3>
  <input type="file" id="imageLoader" multiple accept="image/*"><br><br>
  <div id="imageList"></div>
  <hr>
  <button class="red" onclick="deleteAccount()">Delete My Account</button>
  <button class="gray" onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="toolbar">
    <h2 style="flex:1;">Antana Labeler - Production</h2>
    <button class="green" onclick="markComplete()">Mark Complete</button>
    <button class="red" onclick="deleteSelected()">Delete</button>
    <button class="gray" onclick="clearCurrent()">Clear Image</button>
  </div>
  <div id="workspace">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="rightPanel">
  <h3>Annotations</h3>
  <div id="annotationList"></div>
</div>

<div id="labelPopup">
  <select id="labelSelect">
    <option>Car</option>
    <option>Bus</option>
    <option>Truck</option>
    <option>Pedestrian</option>
    <option>Train</option>
  </select>
  <button onclick="applyLabel()">Apply</button>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const imageLoader=document.getElementById("imageLoader");
const imageList=document.getElementById("imageList");
const annotationList=document.getElementById("annotationList");
const popup=document.getElementById("labelPopup");
const labelSelect=document.getElementById("labelSelect");
const loginEmail=document.getElementById("loginEmail");
const loginPass=document.getElementById("loginPass");
const loginName=document.getElementById("loginName");
const homepage=document.getElementById("homepage");
const greetingDiv=document.getElementById("greeting");

let dataset=JSON.parse(localStorage.getItem("dataset"))||{};
let imagesMeta=JSON.parse(localStorage.getItem("imagesMeta"))||{};
let users=JSON.parse(localStorage.getItem("users"))||[];
let currentImage=null; 
let currentUser=null; 
let img=new Image();

let scale=1;
let originX=0;
let originY=0;

function saveData(){ 
  localStorage.setItem("dataset",JSON.stringify(dataset));
  localStorage.setItem("imagesMeta",JSON.stringify(imagesMeta));
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("currentUser",JSON.stringify(currentUser));
}

/* ===== GREETING BY TIME ===== */
function getGreeting(name){
  const hour=new Date().getHours();
  let greet="Hello";
  if(hour<12) greet="Good Morning";
  else if(hour<18) greet="Good Afternoon";
  else greet="Good Evening";
  return `${greet}, ${name}`;
}

/* ===== LOGIN ===== */
function login(){
  const email=loginEmail.value.trim();
  const pass=loginPass.value.trim();
  const name=loginName.value.trim();
  if(!email||!pass) return alert("Email & password required");

  let user=users.find(u=>u.email===email);
  if(user){
      if(user.pass!==pass) return alert("Wrong password");
      currentUser=user;
  } else {
      if(!name) return alert("Enter full name for new account");
      currentUser={name,email,pass};
      users.push(currentUser);
  }
  saveData();
  homepage.style.display="none";
  greetingDiv.innerText=getGreeting(currentUser.name);
  renderImageList();
}

function logout(){
  currentUser=null;
  localStorage.removeItem("currentUser");
  homepage.style.display="flex";
  greetingDiv.innerText="";
}

function deleteAccount(){
  if(!currentUser) return;
  users=users.filter(u=>u.email!==currentUser.email);
  localStorage.setItem("users",JSON.stringify(users));
  logout();
}

/* ===== FREE MOUSE WHEEL ZOOM ===== */
canvas.addEventListener("wheel", function(e){
  e.preventDefault();
  const zoom= e.deltaY < 0 ? 1.1 : 0.9;
  scale*=zoom;
  redraw();
});

function redraw(){
  ctx.setTransform(scale,0,0,scale,originX,originY);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(img.src) ctx.drawImage(img,0,0);
}

/* ===== IMAGE LOADING ===== */
imageLoader.addEventListener("change",e=>{
  if(!currentUser) return alert("Login required");
  [...e.target.files].forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
          imagesMeta[file.name]={src:ev.target.result,complete:false};
          dataset[file.name]=dataset[file.name]||[];
          saveData();
          renderImageList();
      };
      reader.readAsDataURL(file);
  });
});

function renderImageList(){
  imageList.innerHTML="";
  for(let name in imagesMeta){
      const div=document.createElement("div");
      div.className="imageItem";
      div.innerText=name;
      if(currentImage===name) div.classList.add("active");
      div.onclick=()=>loadImage(name);
      imageList.appendChild(div);
  }
}

function loadImage(name){
  currentImage=name;
  img.src=imagesMeta[name].src;
  img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    scale=1;
    redraw();
  };
}

function applyLabel(){
  if(!currentUser || !currentImage) return;
  dataset[currentImage][0]={label:labelSelect.value};
  popup.style.display="none";
  saveData();
}

function deleteSelected(){ if(!currentUser || !currentImage) return; dataset[currentImage]=[]; saveData(); }
function clearCurrent(){ if(!currentUser || !currentImage) return; dataset[currentImage]=[]; saveData(); }
function markComplete(){ if(!currentUser || !currentImage) return; imagesMeta[currentImage].complete=true; saveData(); }

currentUser=JSON.parse(localStorage.getItem("currentUser")); 
if(currentUser){
  homepage.style.display="none";
  greetingDiv.innerText=getGreeting(currentUser.name);
  renderImageList();
}
</script>
</body>
</html>
