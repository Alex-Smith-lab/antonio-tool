<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antonio Annotation - Professional Suite</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --purple: #7b2ff7; --bg: #0b0b0b; --card: #161616; --border: #333; --blue: #007bff; --orange: #ff9800; --red: #ff4444; }
body { background: var(--bg); color: white; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }

/* Layouts */
#topNav { position: fixed; top: 0; width: 100%; height: 60px; background: #000; border-bottom: 1px solid #222; display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; box-sizing: border-box; }
#workspacePage { display: none; position: fixed; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; }

/* Multi-Camera Sidebar */
#cameraGrid { width: 180px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; overflow-y: auto; transition: 0.3s; }
.camera-box { border-bottom: 1px solid #222; padding: 5px; position: relative; }
.camera-label { font-size: 9px; color: #888; margin-bottom: 2px; display: block; }
.cam-preview { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
.cam-preview.expanded { position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; z-index: 1000; border: 5px solid var(--purple); }

/* Tools Toolbar */
#toolbar { height: 50px; background: #1a1a1a; display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #333; }
.tool-btn { background: #333; border: 1px solid #444; color: white; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.tool-btn.active { background: var(--purple); border-color: white; }

/* Main Area */
#mainContainer { display: flex; flex: 1; overflow: hidden; }
#workzone { flex: 1; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; }
canvas { max-width: 100%; max-height: 100%; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

/* Side Panel */
#sidePanel { width: 280px; background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
.metric-box { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--blue); }

/* Auth */
.auth-page { text-align: center; padding-top: 100px; }
.auth-input { padding: 12px; margin: 10px; width: 260px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; }

/* Timeline */
#timeline { height: 40px; background: #111; border-top: 1px solid #333; display: flex; align-items: center; padding: 0 20px; font-size: 12px; color: var(--purple); }
</style>
</head>
<body>

<div id="loginPage" class="auth-page">
    <h1 style="color:var(--purple); letter-spacing: 2px;">ANTONIO ADMIN CONNECT</h1>
    <input id="userName" class="auth-input" placeholder="Worker Name">
    <input id="userEmail" class="auth-input" placeholder="Email Address">
    <br>
    <button onclick="handleLogin()" style="padding: 12px 50px; background: var(--purple); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">INITIALIZE SESSION</button>
</div>

<div id="topNav">
    <div style="font-weight: bold; color:var(--purple)">a⌵ CORE_WORKSPACE_V2</div>
    <div style="display: flex; align-items: center; gap: 20px;">
        <div id="profileStats" style="text-align: right; font-size: 12px;"></div>
        <button onclick="logout()" style="color:var(--red); background:none; border:none; cursor:pointer;">Exit</button>
    </div>
</div>

<div id="dashboard" style="display:none; padding: 80px 40px;">
    <h2>Available Batches</h2>
    <div id="tasks" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;"></div>
</div>

<div id="workspacePage">
    <div id="toolbar">
        <span style="font-size: 10px; color: #666; margin-right: 10px;">TOOLS:</span>
        <button class="tool-btn" id="tool_2d" onclick="setTool('2d')">2D BOX</button>
        <button class="tool-btn" id="tool_poly" onclick="setTool('poly')">POLYGON</button>
        <button class="tool-btn" id="tool_seg" onclick="setTool('seg')">SEMSEG</button>
        <button class="tool-btn" id="tool_cuboid" onclick="setTool('cuboid')">CUBOID</button>
        <button class="tool-btn" id="tool_line" onclick="setTool('line')">POLYLINES</button>
        <div style="flex-grow: 1;"></div>
        <div id="frameCounter" style="font-family: monospace; color: var(--orange);">FRAME: 0 / 0</div>
    </div>

    <div id="mainContainer">
        <div id="cameraGrid">
            <div class="camera-box"><span class="camera-label">FNC</span><div class="cam-preview" onclick="toggleCam(this)">CAM_01</div></div>
            <div class="camera-box"><span class="camera-label">FWC C</span><div class="cam-preview" onclick="toggleCam(this)">CAM_02</div></div>
            <div class="camera-box"><span class="camera-label">RNC C</span><div class="cam-preview" onclick="toggleCam(this)">CAM_03</div></div>
            <div class="camera-box"><span class="camera-label">RNC R</span><div class="cam-preview" onclick="toggleCam(this)">CAM_04</div></div>
            <div class="camera-box"><span class="camera-label">FWC R</span><div class="cam-preview" onclick="toggleCam(this)">CAM_05</div></div>
            <div class="camera-box"><span class="camera-label">RNC L</span><div class="cam-preview" onclick="toggleCam(this)">CAM_06</div></div>
            <div class="camera-box"><span class="camera-label">FWC L</span><div class="cam-preview" onclick="toggleCam(this)">CAM_07</div></div>
        </div>

        <div id="workzone">
            <canvas id="canvas"></canvas>
            <video id="videoSource" style="display:none;"></video>
        </div>

        <div id="sidePanel">
            <div class="metric-box">
                <div style="font-size: 11px; opacity: 0.7;">QUALITY SCORE</div>
                <div id="qualityValue" style="font-size: 24px; font-weight: bold;">100%</div>
            </div>
            <h4 style="margin: 0 0 10px 0; font-size: 12px;">ANNOTATIONS</h4>
            <div id="annoList" style="flex: 1; overflow-y: auto;"></div>
            <button onclick="submitTask()" style="background: var(--purple); color:white; border:none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px;">SUBMIT SESSION</button>
        </div>
    </div>

    <div id="timeline">
        <span id="videoStatus">VIDEO STREAM: READY</span>
        <span style="margin-left: auto;">Use Left/Right Arrows to Seek</span>
    </div>
</div>

<script>
// Supabase Configuration
const sb = window.supabase.createClient("https://qhftvfatzsogxbbqzxry.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w");

let user = null, activeTask = null;
let currentTool = '2d';
let frames = [], currentFrameIdx = 0;
let canvas, ctx;

// Auth Logic
async function handleLogin() {
    const email = document.getElementById("userEmail").value.trim().toLowerCase();
    const name = document.getElementById("userName").value.trim();
    
    let { data: existing } = await sb.from("ant_users").select("*").eq("email", email).single();
    
    if (!existing) {
        const { data } = await sb.from("ant_users").insert([{ email, name, role: 'worker', status: 'approved', quality: 100 }]).select().single();
        user = data;
    } else {
        user = existing;
    }
    
    localStorage.setItem('workerEmail', email);
    initDashboard();
}

async function initDashboard() {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("topNav").style.display = "flex";
    document.getElementById("dashboard").style.display = "block";
    
    document.getElementById("profileStats").innerHTML = `<b>${user.name}</b> | Quality: ${user.quality}%`;
    
    const { data: tasks } = await sb.from("ant_tasks").select("*").eq("completed", false);
    document.getElementById("tasks").innerHTML = tasks.map(t => `
        <div style="background:#1a1a1a; padding:20px; border-radius:10px; border:1px solid #333;">
            <div style="color:var(--purple); font-weight:bold; margin-bottom:10px;">TASK #${t.id.toString().slice(-4)}</div>
            <button onclick="openWorkspace('${t.id}')" style="width:100%; padding:10px; background:var(--blue); border:none; color:white; border-radius:5px; cursor:pointer;">OPEN WORKSPACE</button>
        </div>
    `).join("");
}

// Video Annotation Logic
async function openWorkspace(taskId) {
    const { data: task } = await sb.from("ant_tasks").select("*").eq("id", taskId).single();
    activeTask = task;
    
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("workspacePage").style.display = "flex";
    document.getElementById("qualityValue").innerText = user.quality + "%";
    
    canvas = document.getElementById("canvas");
    ctx = canvas.getContext("2d");
    
    // Process Video Frames
    const video = document.getElementById("videoSource");
    video.src = task.imgdata; // In video mode, imgdata holds video URL
    video.crossOrigin = "Anonymous";
    
    video.onloadeddata = async () => {
        await extractFrames(video);
        renderFrame();
    };
}

async function extractFrames(video) {
    const duration = video.duration;
    const fps = 10; // Extract 10 frames per second of video
    const totalFrames = Math.floor(duration * fps);
    frames = [];
    
    for(let i=0; i<totalFrames; i++) {
        video.currentTime = i / fps;
        await new Promise(r => video.onseeked = r);
        
        const frameCanvas = document.createElement("canvas");
        frameCanvas.width = video.videoWidth;
        frameCanvas.height = video.videoHeight;
        frameCanvas.getContext("2d").drawImage(video, 0, 0);
        frames.push(frameCanvas.toDataURL("image/jpeg", 0.7));
    }
    
    document.getElementById("frameCounter").innerText = `FRAME: 1 / ${frames.length}`;
}

function renderFrame() {
    if(!frames[currentFrameIdx]) return;
    const img = new Image();
    img.src = frames[currentFrameIdx];
    img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        document.getElementById("frameCounter").innerText = `FRAME: ${currentFrameIdx + 1} / ${frames.length}`;
    };
}

// Navigation Key Events
window.addEventListener("keydown", (e) => {
    if(e.key === "ArrowRight") {
        if(currentFrameIdx < frames.length - 1) { currentFrameIdx++; renderFrame(); }
    }
    if(e.key === "ArrowLeft") {
        if(currentFrameIdx > 0) { currentFrameIdx--; renderFrame(); }
    }
});

// Tool Selection
function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tool_${tool}`).classList.add('active');
}

// Camera Toggle
function toggleCam(el) {
    el.classList.toggle('expanded');
}

// Quality Drop Logic
async function submitTask() {
    // If reviewer_touched flag is set in DB, drop quality
    const { data } = await sb.from("ant_tasks").select("reviewer_touched").eq("id", activeTask.id).single();
    
    if(data.reviewer_touched) {
        let newQuality = Math.max(0, user.quality - 5);
        await sb.from("ant_users").update({ quality: newQuality }).eq("email", user.email);
        alert("Quality drop detected: Reviewer modified your previous work.");
    }
    
    await sb.from("ant_tasks").update({ completed: true }).eq("id", activeTask.id);
    location.reload();
}

function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
