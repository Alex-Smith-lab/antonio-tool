<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Labeler - Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --purple: #7b2ff7; --bg: #0b0b0b; --card: #161616; --border: #333; --blue: #007bff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        #topNav { position: fixed; top: 0; width: 100%; height: 60px; background: black; border-bottom: 1px solid #222; display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; box-sizing: border-box; }
        #dashboard { padding: 100px 60px; display: none; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .batch-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .card-header { height: 60px; background: var(--blue); padding: 10px; }
        .start-work-btn { width: 100%; background: var(--purple); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #workspacePage { display: none; position: fixed; inset: 0; background: #050505; z-index: 200; }
        #workzone { position: absolute; left: 0; top: 0; right: 300px; bottom: 0; display: flex; align-items: center; justify-content: center; }
        #sidePanel { position: absolute; right: 0; top: 0; width: 300px; bottom: 0; background: #111; border-left: 1px solid #222; padding: 20px; box-sizing: border-box; }
        #labelPopup { position: fixed; background: #1a1a1a; border: 1px solid var(--purple); padding: 15px; border-radius: 8px; z-index: 500; display: none; flex-direction: column; gap: 8px; }
        .label-btn { padding: 8px; background: #333; border: none; color: white; border-radius: 4px; cursor: pointer; text-align: left; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 40px; background: var(--purple); color: white; display: none; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 12px; z-index: 300; }
        .auth-page { text-align: center; padding-top: 150px; }
        .auth-page input { padding: 12px; margin: 10px; width: 250px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; }
        #waitMessage { color: #ff9800; display: none; font-weight: bold; margin-top: 20px; border: 1px solid #ff9800; padding: 10px; display: inline-block; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginPage" class="auth-page">
    <h2>Antony Mbali - Worker Portal</h2>
    <input id="userName" placeholder="Full Name">
    <input id="userEmail" placeholder="Email Address">
    <br>
    <button style="padding:12px 40px; background:var(--blue); color:white; border:none; border-radius:5px; cursor:pointer;" onclick="handleLogin()">Login / Register</button>
    <br>
    <div id="waitMessage">ACCESS DENIED: Your account is awaiting Admin Approval.</div>
</div>

<div id="topNav">
    <div style="font-weight: bold;">a⌵ LABELER</div>
    <div style="display:flex; align-items:center; gap:15px;">
        <div style="background: #1d6f42; padding:6px 12px; border-radius:4px; font-size:12px;">Earnings: $<span id="balance">0.00</span></div>
        <div id="workerProfile"></div>
        <button onclick="logout()" style="color:red; background:none; border:none; cursor:pointer;">Logout</button>
    </div>
</div>

<div id="dashboard">
    <h2 id="greet"></h2>
    <div id="tasks" class="task-grid"></div>
</div>

<div id="workspacePage">
    <div id="workzone"><canvas id="canvas"></canvas></div>
    <div id="sidePanel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <span>ANNOTATIONS</span>
            <button onclick="closeWorkspace()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">×</button>
        </div>
        <div id="annoList" style="height:70%; overflow-y:auto;"></div>
        <button onclick="submitForReview()" style="width:100%; background:var(--blue); color:white; padding:15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">SUBMIT REVIEW</button>
    </div>

    <div id="labelPopup">
        <button class="label-btn" onclick="assignLabel('Car')">Car</button>
        <button class="label-btn" onclick="assignLabel('Truck')">Truck</button>
        <button class="label-btn" onclick="assignLabel('Pedestrian')">Pedestrian</button>
        <button onclick="deleteBox()" style="color:red; background:none; border:none; cursor:pointer;">Delete Box</button>
    </div>

    <div style="position:absolute; bottom:60px; left:20px; display:flex; gap:10px;">
        <button id="drawBtn" style="padding:10px 20px; background:var(--purple); border:none; color:white; border-radius:5px; cursor:pointer;" onclick="toggleDrawMode()">ADD BOX</button>
        <button style="padding:10px 20px; background:#444; border:none; color:white; border-radius:5px; cursor:pointer;" onclick="undo()">UNDO</button>
    </div>
</div>

<div class="bottom-bar" id="footerBar">
    <div id="footerWorker">COWORKER: </div>
    <div>ANTONY MBALI MANAGEMENT</div>
</div>

<script>
const supabase = window.supabase.createClient("https://qhftvfatzsogxbbqzxry.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w");

let user = null, activeId = null, boxes = [], selectedBoxIdx = -1, isDrawMode = false;
let scale = 1, offsetX = 0, offsetY = 0, isDragging = false, lastX, lastY, isResizing = false;
let canvas, ctx, img = new Image();

async function handleLogin() {
    const email = document.getElementById("userEmail").value.trim();
    const name = document.getElementById("userName").value.trim();
    if(!email) return;

    const { data: existing } = await supabase.from("ant_users").select("*").eq("email", email).single();
    
    if (!existing) {
        await supabase.from("ant_users").insert([{ email, name, status: 'pending', balance: 0 }]);
        document.getElementById("waitMessage").style.display = "block";
    } else if (existing.status === 'pending') {
        document.getElementById("waitMessage").style.display = "block";
    } else {
        user = existing;
        localStorage.setItem('workerEmail', email);
        showDashboard();
    }
}

async function showDashboard() {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("topNav").style.display = "flex";
    document.getElementById("footerBar").style.display = "flex";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("workerProfile").innerText = user.name;
    document.getElementById("footerWorker").innerText = "COWORKER: " + user.name.toUpperCase();
    document.getElementById("balance").innerText = (user.balance || 0).toFixed(3);

    const { data: tasks } = await supabase.from("ant_tasks").select("*").eq("assignedto", user.email).or('review_status.is.null,review_status.eq.returned');
    
    document.getElementById("tasks").innerHTML = (tasks || []).map(t => `
        <div class="batch-card">
            <div class="card-header">Task: ${t.id.toString().slice(-6)}</div>
            <div style="padding:15px;">
                <button class="start-work-btn" onclick="openWork('${t.id}')">Start Annotation</button>
            </div>
        </div>
    `).join("");
}

async function openWork(id) {
    activeId = id;
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("workspacePage").style.display = "block";
    canvas = document.getElementById("canvas");
    ctx = canvas.getContext("2d");

    const { data } = await supabase.from("ant_tasks").select("*").eq("id", id).single();
    boxes = data.annotations || [];
    img.src = data.imgdata;
    img.onload = () => { resetView(); draw(); updateSidePanel(); };

    canvas.onmousedown = (e) => {
        const mx = (e.clientX - offsetX) / scale;
        const my = (e.clientY - offsetY) / scale;

        if (selectedBoxIdx > -1) {
            const b = boxes[selectedBoxIdx];
            // Refinement Check: Bottom-Right Handle
            if (Math.abs(mx - (b.x + b.w)) < 15/scale && Math.abs(my - (b.y + b.h)) < 15/scale) {
                isResizing = true; return;
            }
        }

        if (isDrawMode) {
            const sx = mx, sy = my;
            canvas.onmouseup = (e2) => {
                const ex = (e2.clientX - offsetX) / scale;
                const ey = (e2.clientY - offsetY) / scale;
                boxes.push({ x: sx, y: sy, w: ex-sx, h: ey-sy, label: 'Unlabeled' });
                selectedBoxIdx = boxes.length - 1;
                showLabelPopup(e2.clientX, e2.clientY);
                toggleDrawMode();
                draw(); updateSidePanel(); saveProgress();
                canvas.onmouseup = () => { isDragging = isResizing = false; };
            };
        } else {
            selectedBoxIdx = boxes.findIndex(b => mx > b.x && mx < b.x+b.w && my > b.y && my < b.y+b.h);
            if (selectedBoxIdx === -1) { isDragging = true; lastX = e.clientX; lastY = e.clientY; document.getElementById("labelPopup").style.display = "none"; }
            else { showLabelPopup(e.clientX, e.clientY); }
            draw();
        }
    };

    window.onmousemove = (e) => {
        if (isDragging) {
            offsetX += e.clientX - lastX; offsetY += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
        } else if (isResizing && selectedBoxIdx > -1) {
            const b = boxes[selectedBoxIdx];
            b.w = ((e.clientX - offsetX) / scale) - b.x;
            b.h = ((e.clientY - offsetY) / scale) - b.y;
        }
        draw();
    };
    window.onmouseup = () => { isDragging = isResizing = false; saveProgress(); };
}

function draw() {
    canvas.width = window.innerWidth - 300; canvas.height = window.innerHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    boxes.forEach((b, i) => {
        ctx.strokeStyle = i === selectedBoxIdx ? "cyan" : "lime";
        ctx.lineWidth = 2 / scale;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        if(i === selectedBoxIdx) {
            ctx.fillStyle = "white"; // Refinement handle
            ctx.fillRect(b.x + b.w - 5/scale, b.y + b.h - 5/scale, 10/scale, 10/scale);
        }
        ctx.fillStyle = "lime"; ctx.font = `${14/scale}px sans-serif`;
        ctx.fillText(b.label, b.x, b.y - 5/scale);
    });
    ctx.restore();
}

function showLabelPopup(x, y) {
    const pop = document.getElementById("labelPopup");
    pop.style.display = "flex"; pop.style.left = x + "px"; pop.style.top = y + "px";
}

function assignLabel(l) {
    if(selectedBoxIdx > -1) {
        boxes[selectedBoxIdx].label = l;
        document.getElementById("labelPopup").style.display = "none";
        draw(); updateSidePanel(); saveProgress();
    }
}

function updateSidePanel() {
    document.getElementById("annoList").innerHTML = boxes.map((b, i) => `<div style="background:#222; padding:10px; margin-bottom:5px; border-radius:4px;">#${i+1} ${b.label}</div>`).join("");
}

async function saveProgress() { if(activeId) await supabase.from("ant_tasks").update({ annotations: boxes }).eq("id", activeId); }
function toggleDrawMode() { isDrawMode = !isDrawMode; document.getElementById("drawBtn").style.opacity = isDrawMode?0.5:1; }
function undo() { boxes.pop(); draw(); updateSidePanel(); saveProgress(); }
function resetView() { scale = 0.8; offsetX = 50; offsetY = 50; }
async function submitForReview() {
    await supabase.from("ant_tasks").update({ review_status: "review_pending" }).eq("id", activeId);
    alert("Batch submitted to Admin."); location.reload();
}
function logout() { localStorage.clear(); location.reload(); }
function closeWorkspace() { document.getElementById("workspacePage").style.display = "none"; showDashboard(); }
</script>
</body>
</html>
