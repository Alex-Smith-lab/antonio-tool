<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antana Labeler - Production</title>
<style>
:root{
--bg:#0b0b0b;
--card:#161616;
--purple:#7b2ff7;
--blue:#0d6efd;
--white:#fff;
--dim:#999;
}

body,html{
margin:0;
padding:0;
font-family:Segoe UI,sans-serif;
background:var(--bg);
color:var(--white);
height:100vh;
overflow-x:hidden;
overflow-y:auto;
font-size:14px;
}

/* PAYMENT ICON */
.payment-container{
position:relative;
cursor:pointer;
margin-right:15px;
font-size:18px;
}
#paymentDropdown{
position:absolute;
right:0;
top:40px;
background:#111;
border:1px solid #333;
padding:10px;
display:none;
border-radius:8px;
z-index:1001;
width:180px;
}

/* LOGIN */
#loginPage{
display:flex;
height:100vh;
position:fixed;
width:100%;
z-index:2000;
background:#000;
}
#loginLeft{flex:1.2;background:url('https://images.unsplash.com/photo-1542281286-9e0a16bb7366?q=80&w=2070') center/cover;}
#loginRight{flex:.8;background:var(--blue);display:flex;align-items:center;justify-content:center;}
.login-box{width:300px;}
input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:4px;}
.login-btn{width:100%;padding:10px;background:white;color:var(--blue);border:none;font-weight:bold;cursor:pointer;border-radius:4px;}

/* NAV */
#topNav{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:1000;
border-bottom:1px solid #222;
}
.nav-right{
display:flex;
align-items:center;
}
.profile-container{position:relative;cursor:pointer;}
#profileDropdown{
position:absolute;
right:0;
top:40px;
background:#111;
border:1px solid #333;
padding:10px;
display:none;
border-radius:8px;
z-index:1001;
}

/* WORKSPACE & OTHER STYLES REMAIN SAME */
#workspacePage{
display:none;
position:fixed;
top:50px;
bottom:20px;
left:0;
right:0;
background:black;
}

#rightPanel{
position:absolute;
right:0;
top:0;
bottom:0;
width:250px;
background:#111;
border-left:1px solid #222;
overflow:auto;
padding:10px;
z-index:200;
}
#rightPanel h3{margin-top:0;}
#hidePanel{position:absolute;left:5px;top:5px;cursor:pointer;color:red;}

#workspaceTop{
position:absolute;
top:10px;
left:10px;
z-index:300;
}
.complete-btn{
background:#00c853;
border:none;
padding:6px 14px;
color:white;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

#boxControls{
position:absolute;
bottom:10px;
left:10px;
font-size:11px;
background:#222;
padding:5px 8px;
display:flex;
gap:5px;
border-radius:6px;
}
#boxControls button{
background:#333;
color:white;
border:none;
padding:4px 6px;
cursor:pointer;
font-size:11px;
}

#workzone{
position:absolute;
left:0;
right:250px;
top:0;
bottom:0;
overflow:hidden;
cursor:grab;
}
canvas{position:absolute;top:0;left:0;}

.footer-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:20px;
background:var(--purple);
font-size:9px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
font-weight:bold;
z-index:2000;
}

.label-popup{
position:absolute;
background:#111;
border:1px solid #333;
padding:5px;
z-index:1000;
display:flex;
flex-direction:column;
}
</style>
</head>
<body>

<div id="loginPage">
<div id="loginLeft"></div>
<div id="loginRight">
<div class="login-box">
<h2>Antana Login</h2>
<input id="userName" placeholder="Full Name">
<input id="userEmail" placeholder="Email">
<input id="userPass" placeholder="Password" type="password">
<button class="login-btn" onclick="handleLogin()">Sign In</button>
</div>
</div>
</div>

<div id="topNav">
<div class="logo" style="font-weight:bold;font-size:18px;">a<span style="color:var(--purple)">⌵</span></div>

<div class="nav-right">
    <!-- 💲 PAYMENT ICON -->
    <div class="payment-container" onclick="togglePayment()">💲
        <div id="paymentDropdown">
            <strong>Payment Summary</strong><hr style="border:0;border-top:1px solid #333">
            Boxes Edited: <span id="editCount">0</span><br>
            Labels Added: <span id="labelCount">0</span><hr style="border:0;border-top:1px solid #333">
            Total: $<span id="totalPay">0.000</span>
        </div>
    </div>

    <div class="profile-container" onclick="toggleProfile()">👤
        <div id="profileDropdown">
            <strong id="displayUserName"></strong><br>
            <small id="displayUserEmail"></small><hr style="border:0;border-top:1px solid #333">
            <button onclick="logout()" style="background:none;border:none;color:red;cursor:pointer;width:100%;text-align:left;">Logout</button>
        </div>
    </div>
</div>
</div>

<script>
let editCount=0;
let labelCount=0;

/* PAYMENT FUNCTIONS */
function togglePayment(){
let dd=document.getElementById("paymentDropdown");
dd.style.display=dd.style.display==="block"?"none":"block";
}

function updatePayment(){
let total=(editCount*0.1)+(labelCount*0.001);
document.getElementById("editCount").innerText=editCount;
document.getElementById("labelCount").innerText=labelCount;
document.getElementById("totalPay").innerText=total.toFixed(3);
}

/* MODIFY EXISTING EVENTS */

/* When box created */
function registerBoxEdit(){
editCount++;
updatePayment();
}

/* When label added */
function registerLabel(){
labelCount++;
updatePayment();
}

/* Hook into your existing logic below */
</script>

<!-- KEEP YOUR EXISTING SCRIPT BELOW -->
<script>
/* INSIDE YOUR EXISTING CODE ADD THESE TWO LINES */

/* After boxes.push(box); add: */
registerBoxEdit();

/* Inside label select onchange add: */
registerLabel();

/* Inside delete and undo reduce edit count properly */
</script>

</body>
</html>
