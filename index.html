<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Labeling Workspace - Antony Mbali</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{ --bg:#0b0b0b; --purple:#7b2ff7; }
        body,html{ margin:0; padding:0; font-family:sans-serif; background:var(--bg); color:white; }
        #loginPage,#waitlistPage{ display:flex; height:100vh; align-items:center; justify-content:center; flex-direction:column; background:black; }
        input{ width:280px; padding:12px; margin:6px; border-radius:4px; border:none; background:#222; color:white; }
        button{ padding:10px 20px; border:none; border-radius:6px; cursor:pointer; background:var(--purple); color:white; font-weight:bold; }
        #topNav{ position:fixed; top:0; width:100%; height:50px; background:black; border-bottom:1px solid #222; display:none; align-items:center; justify-content:space-between; padding:0 20px; }
        #dashboard{ margin-top:60px; padding:40px; display:none; }
        .taskCard{ background:#161616; border:1px solid #333; padding:15px; margin-bottom:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;}
        #workspacePage{ display:none; position:fixed; top:50px; bottom:0; left:0; right:0; background:black; }
        #workzone{ position:absolute; top:0; left:0; bottom:0; right:250px; background:#050505; display:flex; align-items:center; justify-content:center; }
        #rightPanel{ position:absolute; right:0; top:0; bottom:0; width:250px; background:#111; border-left:1px solid #222; padding:15px; }
        canvas{ border:1px solid #444; cursor:crosshair; }
    </style>
</head>
<body>

<div id="loginPage">
    <h2>Antony Mbali Login</h2>
    <input id="userName" placeholder="Full Name">
    <input id="userEmail" placeholder="Email">
    <button onclick="handleLogin()">Login</button>
</div>

<div id="waitlistPage" style="display:none;">
    <h2 style="color:var(--purple);">Waiting For Admin Approval...</h2>
    <p>Your account will open automatically once approved.</p>
    <button onclick="location.reload()" style="background:#444">Cancel</button>
</div>

<div id="topNav">
    <div>a⌵ LABELER</div>
    <button onclick="location.reload()" style="background:none;color:red;">Logout</button>
</div>

<div id="dashboard">
    <h2 id="greetingText"></h2>
    <div id="assignedTasksList"></div>
</div>

<div id="workspacePage">
    <div id="workzone"><canvas id="canvas"></canvas></div>
    <div id="rightPanel">
        <button style="background:#00c853; width:100%;" onclick="completeTask()">SUBMIT TASK</button>
        <h3>Tools</h3>
        <button onclick="enableDraw()" style="width:100%;">Draw Box</button>
    </div>
</div>

<script>
const _supabase = window.supabase.createClient(
    "https://qhftvfatzsogxbbqzxry.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnR2ZmF0enNvZ3hiYnF6eHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzk5MjEsImV4cCI6MjA4ODM1NTkyMX0.A9jvgex5vX1uuGCrzK78yjPGGDBnXLVjK4lOGP0vk0w"
);

let currentUser = null;

async function handleLogin(){
    const name = document.getElementById("userName").value;
    const email = document.getElementById("userEmail").value;

    if(!name || !email) return alert("Fill all fields");

    const {data:user, error} = await _supabase.from("ant_users").select("*").eq("email", email);
    
    if(user.length === 0){
        await _supabase.from("ant_users").insert([{ name, email, status: "pending", role: "worker" }]);
        startWaitlistCheck(email);
    } else {
        if(user[0].status !== "approved") startWaitlistCheck(email);
        else { currentUser = user[0]; initDashboard(); }
    }
}

function startWaitlistCheck(email) {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("waitlistPage").style.display = "flex";
    
    const interval = setInterval(async () => {
        const {data} = await _supabase.from("ant_users").select("*").eq("email", email).single();
        if(data && data.status === "approved") {
            clearInterval(interval);
            currentUser = data;
            initDashboard();
        }
    }, 4000);
}

function initDashboard(){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("waitlistPage").style.display = "none";
    document.getElementById("topNav").style.display = "flex";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("greetingText").innerText = "Welcome " + currentUser.name;
    loadAssignedTasks();
}

async function loadAssignedTasks(){
    const {data:tasks} = await _supabase.from("ant_tasks").select("*").eq("assignedto", currentUser.email).eq("completed",false);
    const container = document.getElementById("assignedTasksList");
    container.innerHTML = tasks.length ? tasks.map(t=>`
        <div class="taskCard">
            <span>TASK #${t.id}</span>
            <button onclick="startWork('${t.id}')">Open</button>
        </div>
    `).join("") : "<h3>No pending tasks</h3>";
}

let canvas, ctx, img = new Image(), boxes = [], activeTaskId = null;

async function startWork(id){
    activeTaskId = id;
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("workspacePage").style.display = "block";
    canvas = document.getElementById("canvas");
    ctx = canvas.getContext("2d");

    const {data} = await _supabase.from("ant_tasks").select("*").eq("id", id).single();
    boxes = data.annotations || [];
    img.src = data.imgdata;
    img.onload = () => { canvas.width = img.width; canvas.height = img.height; draw(); };
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);
    ctx.strokeStyle="lime";
    ctx.lineWidth = 2;
    boxes.forEach(b => ctx.strokeRect(b.x, b.y, b.w, b.h));
}

function enableDraw(){
    canvas.onmousedown = e => {
        const rect = canvas.getBoundingClientRect();
        const startX = e.clientX - rect.left;
        const startY = e.clientY - rect.top;
        canvas.onmouseup = e2 => {
            const endX = e2.clientX - rect.left;
            const endY = e2.clientY - rect.top;
            boxes.push({ x: startX, y: startY, w: endX - startX, h: endY - startY });
            draw();
            saveProgress();
        };
    };
}

async function saveProgress(){
    await _supabase.from("ant_tasks").update({annotations: boxes}).eq("id", activeTaskId);
}

async function completeTask(){
    await _supabase.from("ant_tasks").update({ completed: true, completedby: currentUser.email }).eq("id", activeTaskId);
    alert("Task submitted!");
    location.reload();
}
</script>
</body>
</html>
