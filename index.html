<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AnnotatorS - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="loginPage" class="split-login">
        <div class="login-left" style="background-image: url('scene.jpg');"></div>
        <div class="login-right">
            <h1>TM <span>ANNOTATION</span></h1>
            <input id="userName" placeholder="Full Name">
            <input id="userEmail" placeholder="Email">
            <button onclick="handleLogin()">Access Dashboard</button>
            <p id="waitMessage" style="display:none; color:orange;">On Waitlist: Awaiting Admin Approval...</p>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <nav id="topNav">Welcome to your Workspace</nav>
        <div id="taskList"></div>
    </div>

    <div id="workspace" style="display:none;">
        <canvas id="canvas"></canvas>
        <div id="tools">
            </div>
    </div>

    <script src="app.js"></script>
    <script src="workspace.js"></script>
</body>
</html>
