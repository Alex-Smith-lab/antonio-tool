<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antana Labeler - Production</title>
<style>
:root{
--bg:#0b0b0b;
--card:#161616;
--purple:#7b2ff7;
--blue:#0d6efd;
--white:#fff;
--dim:#999;
}

body,html{
margin:0;
padding:0;
font-family:Segoe UI,sans-serif;
background:var(--bg);
color:var(--white);
height:100vh;
overflow-x:hidden;
overflow-y:auto;
font-size:14px;
}

/* LOGIN */
#loginPage{
display:flex;
height:100vh;
position:fixed;
width:100%;
z-index:2000;
background:#000;
}
#loginLeft{flex:1.2;background:url('https://images.unsplash.com/photo-1542281286-9e0a16bb7366?q=80&w=2070') center/cover;}
#loginRight{flex:.8;background:var(--blue);display:flex;align-items:center;justify-content:center;}
.login-box{width:300px;}
input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:4px;color: #000;}
.login-btn{width:100%;padding:10px;background:white;color:var(--blue);border:none;font-weight:bold;cursor:pointer;border-radius:4px;}

/* NAV */
#topNav{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:1000;
border-bottom:1px solid #222;
}
.nav-right {
    display: flex;
    align-items: center;
    gap: 15px;
}
#paymentDisplay {
    color: #00c853;
    font-weight: bold;
    font-family: monospace;
    font-size: 16px;
}
.profile-container{position:relative;cursor:pointer;}
#profileDropdown{
position:absolute;
right:0;
top:40px;
background:#111;
border:1px solid #333;
padding:10px;
display:none;
border-radius: 8px;
z-index: 1001;
}

/* DASHBOARD LAYOUT */
#dashboard{
margin-top:70px;
padding:0 10%;
display: flex;
flex-direction: column;
align-items: flex-start;
}

.section-title {
    color: var(--dim);
    font-size: 12px;
    margin: 20px 0;
    font-weight: 500;
}

.work-card{
    background:var(--card);
    padding:15px;
    width:240px;
    border-radius:12px;
    border: 1px solid #222;
    position: relative;
}

.card-header-icon {
    background: #222;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
}

.card-badge {
    background: rgba(123, 47, 247, 0.2);
    color: var(--purple);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    position: absolute;
    top: 15px;
    right: 15px;
    font-weight: bold;
}

.upload-area{
    margin-top:15px;
    border:1.5px dashed #333;
    padding:15px;
    text-align:center;
    cursor:pointer;
    border-radius: 8px;
    display: block;
    font-size: 11px;
    color: var(--dim);
}

.upload-area:hover { border-color: var(--purple); color: white; }

.continue-btn{
    margin-top:15px;
    background:var(--purple);
    color:white;
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
    border-radius:8px;
    font-weight: bold;
    font-size: 12px;
}

.sessions-container {
    margin-top: 40px;
    width: 100%;
    text-align: center;
    padding-bottom: 50px;
}

.empty-sessions-graphic {
    width: 120px;
    height: auto;
    margin: 20px auto;
    opacity: 0.6;
}

.no-sessions-text {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 5px;
}

.sub-text {
    color: var(--dim);
    font-size: 12px;
    line-height: 1.5;
}

/* WORKSPACE */
#workspacePage{
display:none;
position:fixed;
top:50px;
bottom:20px;
left:0;
right:0;
background:black;
}

#rightPanel{
position:absolute;
right:0;
top:0;
bottom:0;
width:250px;
background:#111;
border-left:1px solid #222;
overflow:auto;
padding:10px;
z-index:200;
}
#rightPanel h3{margin-top:0;}
#hidePanel{
position:absolute;
left:5px;
top:5px;
cursor:pointer;
color:red;
}
#showPanelBtn{
position:absolute;
right:5px;
top:5px;
z-index:250;
background:#222;
border:none;
color:white;
padding:4px 8px;
cursor:pointer;
display:none;
}

#workspaceTop{
position:absolute;
top:10px;
left:10px;
z-index:300;
}
.complete-btn{
background:#00c853;
border:none;
padding:6px 14px;
color:white;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

#boxControls{
position:absolute;
bottom:10px;
left:10px;
font-size:11px;
background:#222;
border:none;
color:white;
padding:5px 8px;
cursor:pointer;
display:flex;
gap:5px;
}
#boxControls button { cursor:pointer; background:#444; color:white; border:none; padding:4px 8px; border-radius:3px;}
#boxControls button:hover { background:var(--purple); }

#workzone{
position:absolute;
left:0;
right:250px;
top:0;
bottom:0;
overflow:hidden;
}
canvas{
position:absolute;
top:0;
left:0;
cursor: crosshair;
}

.footer-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:20px;
background:var(--purple);
font-size:9px;
display:flex;
justify-content:space-between;
align-items: center;
padding:0 10px;
font-weight:bold;
z-index: 2000;
}

.label-popup{
position:absolute;
background:#111;
border:1px solid #333;
padding:5px;
z-index:1000;
display:flex;
flex-direction:column;
box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
.label-popup select{margin-bottom:5px; background:#222; color:white; border:1px solid #444;}
.label-popup button{background:red;color:white;border:none;padding:2px 5px;font-size:11px;cursor:pointer;}
</style>
</head>
<body onpaste="return false;"> <div id="loginPage">
<div id="loginLeft"></div>
<div id="loginRight">
<div class="login-box">
<h2 style="margin-bottom: 20px;">Antana Login</h2>
<input id="userName" placeholder="Full Name">
<input id="userEmail" placeholder="Email">
<input id="userPass" placeholder="Password" type="password">
<button class="login-btn" onclick="handleLogin()">Sign In</button>
</div>
</div>
</div>

<div id="topNav">
<div class="logo" style="font-weight: bold; font-size: 18px;">a<span style="color:var(--purple)">⌵</span></div>
<div class="nav-right">
    <div id="paymentDisplay">$0.000</div>
    <div class="profile-container" onclick="toggleProfile()">👤
        <div id="profileDropdown">
        <strong id="displayUserName"></strong><br>
        <small id="displayUserEmail"></small><hr style="border:0; border-top:1px solid #333">
        <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; width:100%; text-align:left;">Logout</button>
        </div>
    </div>
</div>
</div>

<div id="dashboard">
<h2 id="greetingText" style="font-weight: 500; font-size: 24px; margin-bottom: 10px;">Welcome!</h2>

<div class="section-title">Available Work</div>

<div class="work-card">
    <div class="card-header-icon">🔨</div>
    <div class="card-badge">In Progress</div>
    
    <div style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">Upload New Dataset</div>
    <div style="color: var(--dim); font-size: 11px;">Select images to begin a new labeling session.</div>

    <label class="upload-area">
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="updateFileName(this)">
        <span style="font-size: 20px; display: block; margin-bottom: 5px;">📁</span>
        <span id="fileLabelText">Click or Drop Files</span>
    </label>
    
    <button class="continue-btn" onclick="startWork()">Continue →</button>
</div>

<div class="section-title">Your Sessions</div>

<div class="sessions-container">
    <svg class="empty-sessions-graphic" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="20" width="40" height="50" rx="4" fill="#161616" stroke="#333" />
        <rect x="30" y="10" width="40" height="50" rx="4" fill="#7b2ff7" opacity="0.8" />
        <rect x="50" y="20" width="40" height="50" rx="4" fill="#161616" stroke="#333" />
        <circle cx="50" cy="35" r="5" fill="white" opacity="0.5" />
    </svg>
    <div class="no-sessions-text">No More Sessions</div>
    <div class="sub-text">Oh no! It looks like we don't have any more<br>sessions available for you. Check back soon.</div>
</div>
</div>

<div id="workspacePage">
<div id="rightPanel">
<span id="hidePanel" onclick="hidePanel()">❌</span>
<h3>Annotations</h3>
<div id="annotationList"></div>
</div>

<button id="showPanelBtn" onclick="showPanel()">☰</button>

<div id="workspaceTop">
<button class="complete-btn" onclick="completeTask()">✔ Complete</button>
</div>

<div id="boxControls">
<button onclick="enableDraw()">+ Add Box</button>
<button onclick="deleteLastBox()">- Delete Last</button>
<button onclick="undoLastBox()">⮪ Undo</button>
</div>

<div id="workzone">
<canvas id="canvas"></canvas>
</div>
</div>

<div class="footer-bar">
<span id="footerLeft"></span>
<span id="footerRight"></span>
</div>

<script>
let currentUser=null;
let canvas,ctx,img=new Image();
let boxes=[],history=[],drawing=false,dragging=false,startX,startY,drawMode=false;
let scale=1,originX=0,originY=0;
let balance = parseFloat(localStorage.getItem("antana_balance")) || 0;

// Prevent paste on whole document
document.addEventListener('paste', e => e.preventDefault());

function updateBalance(amount) {
    balance += amount;
    localStorage.setItem("antana_balance", balance.toFixed(4));
    document.getElementById("paymentDisplay").innerText = "$" + balance.toFixed(3);
}

function updateFileName(input) {
    const fileName = input.files[0] ? input.files[0].name : "Click or Drop Files";
    document.getElementById('fileLabelText').innerText = fileName;
}

function handleLogin(){
    const nameInput = document.getElementById("userName").value;
    const emailInput = document.getElementById("userEmail").value;
    const passInput = document.getElementById("userPass").value;

    if(!nameInput || !emailInput || !passInput) {
        alert("Please fill in all fields");
        return;
    }

    currentUser = {name: nameInput, email: emailInput};
    localStorage.setItem("antana_user", JSON.stringify(currentUser));
    initDashboard();
}

function initDashboard(){
    let saved = localStorage.getItem("antana_user");
    document.getElementById("paymentDisplay").innerText = "$" + balance.toFixed(3);

    if(saved){
        currentUser = JSON.parse(saved);
        document.getElementById("loginPage").style.display="none";
        document.getElementById("displayUserName").innerText = currentUser.name;
        document.getElementById("displayUserEmail").innerText = currentUser.email;
        document.getElementById("footerLeft").innerText = "COWORKER: " + currentUser.name.toUpperCase() + " • ANTONY COMPANY";
        document.getElementById("footerRight").innerText = "COWORKER: " + currentUser.name.toUpperCase() + " • FB2905 [WASM | WEBGL]";

        let h = (new Date()).getHours();
        let greet = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
        document.getElementById("greetingText").innerText = greet + ", " + currentUser.name.split(' ')[0] + "!";
    }
}

function startWork(){
    const file = document.getElementById("fileInput").files[0];
    if(!file && !localStorage.getItem("antana_image")) return alert("Upload first");
    
    document.getElementById("dashboard").style.display="none";
    document.getElementById("workspacePage").style.display="block";

    canvas = document.getElementById("canvas");
    ctx = canvas.getContext("2d");

    if(file){
        let reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
            localStorage.setItem("antana_image", img.src);
        };
        reader.readAsDataURL(file);
    } else {
        img.src = localStorage.getItem("antana_image");
    }

    img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        initCanvas();
        loadBoxes();
        draw();
    };
}

function initCanvas(){
    canvas.onmousedown = function(e){
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left - originX) / scale;
        const y = (e.clientY - rect.top - originY) / scale;

        if(drawMode){
            saveHistory();
            startX = x;
            startY = y;
            drawing = true;
        } else {
            dragging = true;
        }
    };

    canvas.onmousemove = function(e){
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left - originX) / scale;
        const y = (e.clientY - rect.top - originY) / scale;

        if(drawing){
            draw();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2 / scale;
            ctx.strokeRect(startX, startY, x - startX, y - startY);
        } else if(dragging){
            originX += e.movementX;
            originY += e.movementY;
            draw();
        }
    };

    canvas.onmouseup = function(e){
        if(drawing){
            drawing = false;
            const rect = canvas.getBoundingClientRect();
            let x = (e.clientX - rect.left - originX) / scale;
            let y = (e.clientY - rect.top - originY) / scale;

            let box = {
                x: Math.min(startX, x),
                y: Math.min(startY, y),
                w: Math.abs(x - startX),
                h: Math.abs(y - startY),
                label: "",
                color: "lime",
                id: Date.now()
            };

            if(box.w > 5 && box.h > 5){
                boxes.push(box);
                showLabelPopup(e.pageX, e.pageY, box);
                updateBalance(0.01);
            }
            drawMode = false;
            draw();
        }
        dragging = false;
    };
}

function draw(){
    if(!ctx) return;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.translate(originX, originY);
    ctx.scale(scale, scale);
    
    ctx.drawImage(img,0,0);
    
    boxes.forEach(b=>{
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 2 / scale;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = b.color;
        ctx.font = `${14/scale}px Arial`;
        if(b.label) ctx.fillText(b.label, b.x, b.y - (5/scale));
    });
}

function showLabelPopup(x,y,box){
    let pop = document.createElement("div");
    pop.className = "label-popup";
    pop.style.left = x + "px";
    pop.style.top = y + "px";
    pop.innerHTML = `
    <select id="popSel">
        <option value="">Select Label</option>
        <option value="Car" data-color="#00ff00">Car</option>
        <option value="Bus" data-color="#ff0000">Bus</option>
        <option value="Truck" data-color="#7b2ff7">Truck</option>
        <option value="Pedestrian" data-color="#00ffff">Pedestrian</option>
    </select>
    <button onclick="this.parentElement.remove(); deleteBox(${box.id})">Cancel</button>`;
    document.body.appendChild(pop);
    
    const sel = pop.querySelector("#popSel");
    sel.focus();
    sel.onchange = function(){
        box.label = this.value;
        box.color = this.options[this.selectedIndex].dataset.color;
        updateBalance(0.005);
        saveBoxes();
        draw();
        updateAnnotationList();
        pop.remove();
    };
}

function enableDraw(){ drawMode = true; alert("Drawing Mode Active: Click and Drag on image"); }

function saveHistory(){ history.push(JSON.stringify(boxes)); if(history.length > 20) history.shift(); }

function undoLastBox(){
    if(history.length > 0){
        boxes = JSON.parse(history.pop());
        saveBoxes();
        draw();
        updateAnnotationList();
    }
}

function deleteLastBox(){
    if(boxes.length > 0){
        saveHistory();
        boxes.pop();
        saveBoxes();
        draw();
        updateAnnotationList();
    }
}

function deleteBox(id){
    saveHistory();
    boxes = boxes.filter(b=>b.id !== id);
    saveBoxes();
    draw();
    updateAnnotationList();
}

function updateAnnotationList(){
    const list = document.getElementById("annotationList");
    list.innerHTML = "";
    boxes.forEach(b => {
        let item = document.createElement("div");
        item.style.padding = "5px";
        item.style.borderBottom = "1px solid #222";
        item.innerHTML = `<span style="color:${b.color}">■</span> ${b.label || 'Drawing...'}`;
        list.appendChild(item);
    });
}

function saveBoxes(){ localStorage.setItem("antana_boxes", JSON.stringify(boxes)); }
function loadBoxes(){ 
    let saved = localStorage.getItem("antana_boxes"); 
    if(saved) { boxes = JSON.parse(saved); updateAnnotationList(); }
}

function hidePanel(){
    document.getElementById("rightPanel").style.display="none";
    document.getElementById("workzone").style.right="0";
    document.getElementById("showPanelBtn").style.display="block";
}
function showPanel(){
    document.getElementById("rightPanel").style.display="block";
    document.getElementById("workzone").style.right="250px";
    document.getElementById("showPanelBtn").style.display="none";
}

function completeTask(){
    if(confirm("Complete and Save?")){
        localStorage.removeItem("antana_image");
        localStorage.removeItem("antana_boxes");
        boxes = [];
        location.reload();
    }
}

window.onload = initDashboard;
</script>
</body>
</html>
