<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antana Labeler - Production</title>
<style>
:root{
--bg:#0b0b0b;
--card:#161616;
--purple:#7b2ff7;
--blue:#0d6efd;
--white:#fff;
--dim:#999;
}

body,html{
margin:0;
padding:0;
font-family:Segoe UI,sans-serif;
background:var(--bg);
color:var(--white);
height:100vh;
overflow:hidden;
font-size:14px;
}

/* LOGIN */
#loginPage{
display:flex;
height:100vh;
position:fixed;
width:100%;
z-index:2000;
background:#000;
}
#loginLeft{flex:1.2;background:url('https://images.unsplash.com/photo-1542281286-9e0a16bb7366?q=80&w=2070') center/cover;}
#loginRight{flex:.8;background:var(--blue);display:flex;align-items:center;justify-content:center;}
.login-box{width:300px;}
input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:4px;}
.login-btn{width:100%;padding:10px;background:white;color:var(--blue);border:none;font-weight:bold;cursor:pointer;border-radius:4px;}

/* NAV */
#topNav{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:1000;
border-bottom:1px solid #222;
}
.profile-container{position:relative;cursor:pointer;}
#profileDropdown{
position:absolute;
right:0;
top:40px;
background:#111;
border:1px solid #333;
padding:10px;
display:none;
}

/* DASHBOARD */
#dashboard{
margin-top:70px;
padding:20px;
}
.work-card{background:var(--card);padding:20px;width:280px;border-radius:8px;}
.upload-area{margin-top:10px;border:1.5px dashed #333;padding:15px;text-align:center;cursor:pointer;}
.continue-btn{margin-top:15px;background:var(--purple);color:white;border:none;padding:10px;width:100%;cursor:pointer;border-radius:6px;}

/* WORKSPACE */
#workspacePage{
display:none;
position:fixed;
top:50px;
bottom:20px;
left:0;
right:0;
background:black;
}

/* RIGHT ANNOTATION PANEL */
#rightPanel{
position:absolute;
right:0;
top:0;
bottom:0;
width:250px;
background:#111;
border-left:1px solid #222;
overflow:auto;
padding:10px;
z-index:200;
}
#rightPanel h3{margin-top:0;}
#hidePanel{
position:absolute;
left:5px;
top:5px;
cursor:pointer;
color:red;
}
#showPanelBtn{
position:absolute;
right:5px;
top:5px;
z-index:250;
background:#222;
border:none;
color:white;
padding:4px 8px;
cursor:pointer;
display:none;
}

/* TOP COMPLETE BUTTON */
#workspaceTop{
position:absolute;
top:10px;
left:10px;
z-index:300;
}
.complete-btn{
background:#00c853;
border:none;
padding:6px 14px;
color:white;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

/* ADD/DELETE/UNDO TOOL */
#boxControls{
position:absolute;
bottom:10px;
left:10px;
font-size:11px;
background:#222;
border:none;
color:white;
padding:5px 8px;
cursor:pointer;
display:flex;
gap:5px;
}

/* WORKZONE */
#workzone{
position:absolute;
left:0;
right:250px;
top:0;
bottom:0;
overflow:hidden;
cursor:grab;
}
canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
}

/* FOOTER */
.footer-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:20px;
background:var(--purple);
font-size:9px;
display:flex;
justify-content:space-between;
padding:3px 10px;
font-weight:bold;
}

/* LABEL POPUP */
.label-popup{
position:absolute;
background:#111;
border:1px solid #333;
padding:5px;
z-index:1000;
display:flex;
flex-direction:column;
}
.label-popup select{margin-bottom:5px;}
.label-popup button{background:red;color:white;border:none;padding:2px 5px;font-size:11px;cursor:pointer;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
<div id="loginLeft"></div>
<div id="loginRight">
<div class="login-box">
<h2>Antana Login</h2>
<input id="userName" placeholder="Full Name">
<input id="userEmail" placeholder="Email">
<input id="userPass" placeholder="Password" type="password">
<button class="login-btn" onclick="handleLogin()">Sign In</button>
</div>
</div>
</div>

<!-- NAV -->
<div id="topNav">
<div></div>
<div class="profile-container" onclick="toggleProfile()">👤
<div id="profileDropdown">
<strong id="displayUserName"></strong><br>
<small id="displayUserEmail"></small><hr>
<button onclick="logout()">Logout</button>
</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2 id="greetingText">Welcome!</h2>
<div class="work-card">
<label class="upload-area">
<input type="file" id="fileInput" accept="image/*">
📁 Select Image
</label>
<button class="continue-btn" onclick="startWork()">Continue →</button>
</div>
</div>

<!-- WORKSPACE -->
<div id="workspacePage">
<div id="rightPanel">
<span id="hidePanel" onclick="hidePanel()">❌</span>
<h3>Annotations</h3>
<div id="annotationList"></div>
</div>

<button id="showPanelBtn" onclick="showPanel()">☰</button>

<div id="workspaceTop">
<button class="complete-btn" onclick="completeTask()">✔ Complete</button>
</div>

<div id="boxControls">
<button onclick="enableDraw()">+ Add Box</button>
<button onclick="deleteLastBox()">- Delete Last</button>
<button onclick="undoLastBox()">⮪ Undo</button>
</div>

<div id="workzone">
<canvas id="canvas"></canvas>
</div>
</div>

<div class="footer-bar">
<span id="footerLeft"></span>
<span id="footerRight"></span>
</div>

<script>
let currentUser=null;
let canvas,ctx,img=new Image();
let boxes=[],history=[],drawing=false,startX,startY,drawMode=false;
let scale=1,originX=0,originY=0;

/* LOGIN */
function handleLogin(){
const name=userName.value;
const email=userEmail.value;
if(!name||!email)return alert("Fill all");
currentUser={name,email};
localStorage.setItem("antana_user",JSON.stringify(currentUser));
initDashboard();
}
function initDashboard(){
let saved=localStorage.getItem("antana_user");
if(saved){
currentUser=JSON.parse(saved);
loginPage.style.display="none";
displayUserName.innerText=currentUser.name;
displayUserEmail.innerText=currentUser.email;
footerLeft.innerText="COWORKER: "+currentUser.name;
footerRight.innerText="COWORKER: "+currentUser.name;

// Dynamic greeting
let h=(new Date()).getHours();
let greet="Good evening";
if(h>=5 && h<11) greet="Good morning";
else if(h>=11 && h<17) greet="Good afternoon";
else if(h>=17 && h<23) greet="Good evening";
else greet="Hi "+currentUser.name+", it's late! Take some rest!";
greetingText.innerText=greet;
}
}
function toggleProfile(){profileDropdown.style.display=profileDropdown.style.display==="block"?"none":"block";}
function logout(){localStorage.clear();location.reload();}

/* WORKSPACE */
function startWork(){
const file=fileInput.files[0];
if(!file)return alert("Upload first");
dashboard.style.display="none";
workspacePage.style.display="block";

canvas=document.getElementById("canvas");
ctx=canvas.getContext("2d");

let reader=new FileReader();
reader.onload=e=>{
img.src=e.target.result;
localStorage.setItem("antana_image",img.src);
};
reader.readAsDataURL(file);

img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
draw();
loadBoxes();
};

initCanvas();
}

/* CANVAS EVENTS */
let dragging=false;
function initCanvas(){
canvas.ondblclick=e=>{
const rect=canvas.getBoundingClientRect();
startX=(e.clientX-rect.left-originX)/scale;
startY=(e.clientY-rect.top-originY)/scale;
drawMode=true;
drawing=true;
};
canvas.onmousemove=e=>{
const rect=canvas.getBoundingClientRect();
const x=(e.clientX-rect.left-originX)/scale;
const y=(e.clientY-rect.top-originY)/scale;
if(drawing){draw();ctx.strokeStyle="white";ctx.strokeRect(startX,startY,x-startX,y-startY);}
if(dragging){originX+=e.movementX;originY+=e.movementY;draw();}
};
canvas.onmouseup=e=>{
if(drawing){
drawing=false;
const rect=canvas.getBoundingClientRect();
let x=(e.clientX-rect.left-originX)/scale;
let y=(e.clientY-rect.top-originY)/scale;
let box={x:startX,y:startY,w:x-startX,h:y-startY,label:"",id:Date.now()};
boxes.push(box);history.push(JSON.stringify(boxes));
saveBoxes();
showLabelPopup(e.pageX,e.pageY,box);
drawMode=false;
updateAnnotationList();
}
dragging=false;
};
canvas.onmousedown=e=>{
if(!drawMode) dragging=true;
};
canvas.onwheel=e=>{
e.preventDefault();
scale+=e.deltaY*-0.001;
scale=Math.min(Math.max(.5,scale),5);
draw();
};
}

/* DRAW */
function draw(){
ctx.setTransform(scale,0,0,scale,originX,originY);
ctx.clearRect(-originX/scale,-originY/scale,canvas.width/scale,canvas.height/scale);
ctx.drawImage(img,0,0,canvas.width,canvas.height);
boxes.forEach(b=>{
ctx.strokeStyle=b.color||"lime";
ctx.strokeRect(b.x,b.y,b.w,b.h);
ctx.fillStyle=b.color||"lime";
ctx.font="12px Arial";
if(b.label)ctx.fillText(b.label,b.x,b.y-5);
});
}

/* LABEL POPUP */
function showLabelPopup(x,y,box){
let pop=document.createElement("div");
pop.className="label-popup";
pop.style.left=x+"px";
pop.style.top=y+"px";
pop.innerHTML=`
<select>
<option value="">Select</option>
<option value="Car" data-color="green">Car</option>
<option value="Bus" data-color="red">Bus</option>
<option value="Truck" data-color="purple">Truck</option>
<option value="Motorcycle" data-color="blue">Motorcycle</option>
<option value="Pedestrian" data-color="cyan">Pedestrian</option>
<option value="Unknown" data-color="gray">Unknown</option>
</select>
<button onclick="deleteBox(${box.id});this.parentElement.remove()">Delete</button>
`;
document.body.appendChild(pop);
pop.querySelector("select").onchange=function(){
box.label=this.value;
box.color=this.options[this.selectedIndex].dataset.color;
saveBoxes();
draw();
pop.remove();
updateAnnotationList();
};
}

/* BOX CONTROLS */
function enableDraw(){drawMode=true;}
function deleteLastBox(){if(boxes.length>0){boxes.pop();history.push(JSON.stringify(boxes));saveBoxes();draw();updateAnnotationList();}}
function undoLastBox(){if(history.length>1){history.pop();boxes=JSON.parse(history[history.length-1]);saveBoxes();draw();updateAnnotationList();}}

/* ANNOTATION PANEL */
function updateAnnotationList(){
annotationList.innerHTML="";
boxes.forEach(b=>{
annotationList.innerHTML+=`<div>${b.label||"Unlabeled"}</div>`;
});
}
function hidePanel(){rightPanel.style.display="none";workzone.style.right="0";showPanelBtn.style.display="block";}
function showPanel(){rightPanel.style.display="block";workzone.style.right="250px";showPanelBtn.style.display="none";}

/* DELETE BOX */
function deleteBox(id){boxes=boxes.filter(b=>b.id!==id);history.push(JSON.stringify(boxes));saveBoxes();draw();updateAnnotationList();}

/* SAVE/LOAD */
function saveBoxes(){localStorage.setItem("antana_boxes",JSON.stringify(boxes));}
function loadBoxes(){let saved=localStorage.getItem("antana_boxes");if(saved){boxes=JSON.parse(saved);draw();updateAnnotationList();history.push(JSON.stringify(boxes));}}

/* COMPLETE */
function completeTask(){
localStorage.removeItem("antana_image");
localStorage.removeItem("antana_boxes");
boxes=[];
workspacePage.style.display="none";
dashboard.style.display="block";
drawMode=false;
}

/* INIT */
window.onload=()=>{
initDashboard();
let imgData=localStorage.getItem("antana_image");
if(imgData){
dashboard.style.display="none";
workspacePage.style.display="block";
canvas=document.getElementById("canvas");
ctx=canvas.getContext("2d");
img.src=imgData;
img.onload=()=>{canvas.width=img.width;canvas.height=img.height;draw();loadBoxes();};
initCanvas();
}
};
</script>
</body>
</html>
