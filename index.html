<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Antana Labeler - Production</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --accent-purple: #7b2ff7;
            --accent-blue: #0d6efd;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== LOGIN PAGE ===== */
        #loginPage {
            display: flex;
            height: 100vh;
            width: 100%;
            position: fixed;
            z-index: 2000;
            background: var(--bg-color);
        }

        #loginLeft {
            flex: 1.2;
            background: url('https://images.unsplash.com/photo-1542281286-9e0a16bb7366?q=80&w=2070') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Overlay for the 2D "Bounding Box" look */
        #loginLeft::after {
            content: "Vehicle: Car [98%]";
            position: absolute;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 5px;
            font-weight: bold;
            top: 40%; left: 30%;
            background: rgba(0,0,0,0.5);
        }

        #loginRight {
            flex: 0.8;
            background: var(--accent-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-box { width: 100%; max-width: 350px; }
        .login-box h2 { margin-bottom: 20px; font-size: 24px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: var(--accent-blue);
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
        }

        /* ===== WORKSPACE LAYOUT ===== */
        #topNav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0,0,0,0.2);
        }

        .profile-container {
            position: relative;
            cursor: pointer;
        }

        #profileDropdown {
            position: absolute;
            right: 0;
            top: 40px;
            background: #222;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            display: none;
            min-width: 180px;
            z-index: 100;
        }

        #dashboard {
            max-width: 1200px;
            margin: 40px auto;
            width: 90%;
            overflow-y: auto;
            height: calc(100vh - 150px);
        }

        .work-card {
            background: var(--card-bg);
            width: 320px;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #222;
        }

        .upload-area {
            margin-top: 20px;
            border: 2px dashed #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        #fileInput { display: none; }

        .continue-btn {
            background: var(--accent-purple);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ===== FOOTER ===== */
        .footer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--accent-purple);
            color: white;
            font-size: 10px;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="loginPage">
        <div id="loginLeft"></div>
        <div id="loginRight">
            <div class="login-box">
                <h2>Antana Login</h2>
                <input type="text" id="userName" placeholder="Full Name">
                <input type="email" id="userEmail" placeholder="Email Address">
                <input type="password" id="userPass" placeholder="Password">
                <button class="login-btn" onclick="handleLogin()">Sign In</button>
            </div>
        </div>
    </div>

    <div id="topNav">
        <div class="logo">a<span>&#129107;</span></div>
        <div class="profile-container" onclick="toggleProfile()">
            <span style="font-size: 20px;">👤</span>
            <div id="profileDropdown">
                <strong id="displayUserName">User Name</strong><br>
                <small id="displayUserEmail" style="color:gray"></small>
                <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
                <button onclick="logout()" style="background:none; border:none; color:#ff4444; cursor:pointer; padding:0;">Logout</button>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <h1 id="greetingText">Good evening! ☁️</h1>

        <span style="color:var(--text-dim); font-size: 0.9rem; margin-bottom:20px; display:block;">Available Work</span>

        <div class="work-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <div style="background:#2a2a2a; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center;">🔨</div>
                <div style="background:rgba(123, 47, 247, 0.2); color:var(--accent-purple); padding:4px 10px; border-radius:15px; font-size:11px; font-weight:bold;">In Progress</div>
            </div>

            <span style="font-weight:bold; display:block;">Upload New Dataset</span>
            <p style="color:var(--text-dim); font-size:12px;">Select images to begin your private session.</p>

            <label for="fileInput" class="upload-area">
                <div style="font-size: 24px;">📁</div>
                <div style="font-size: 11px; margin-top: 5px;">Click or Drop Files</div>
                <input type="file" id="fileInput" multiple accept="image/*">
            </label>

            <button class="continue-btn" onclick="startWork()">Continue →</button>
        </div>
    </div>

    <div class="footer-bar">
        <span id="footerLeft">COWORKER: LOADING...</span>
        <span id="footerRight">COWORKER: LOADING...</span>
    </div>

    <script>
        let currentUser = null;

        // LOGIN LOGIC
        function handleLogin() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            
            if(!name || !email) return alert("Please fill in your details");

            currentUser = { name, email };
            localStorage.setItem("antana_user", JSON.stringify(currentUser));
            initDashboard();
        }

        function initDashboard() {
            const saved = localStorage.getItem("antana_user");
            if(saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('greetingText').innerText = `Good evening, ${currentUser.name.split(' ')[0]}! ☁️`;
                document.getElementById('displayUserName').innerText = currentUser.name;
                document.getElementById('displayUserEmail').innerText = currentUser.email;
                
                // Update Footer with Antony Company
                const footerText = `COWORKER: ${currentUser.name} • Antony Company`;
                document.getElementById('footerLeft').innerText = footerText;
                document.getElementById('footerRight').innerText = footerText;

                loadUserTasks();
            }
        }

        // PROFILE DROPDOWN
        function toggleProfile() {
            const dd = document.getElementById('profileDropdown');
            dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
        }

        // UNIQUE TASK LOADING (Private to each email)
        function loadUserTasks() {
            const allTasks = JSON.parse(localStorage.getItem("antana_tasks") || "{}");
            const userTasks = allTasks[currentUser.email] || [];
            console.log("Loading private tasks for:", currentUser.email, userTasks);
        }

        function startWork() {
            const files = document.getElementById('fileInput').files;
            if(files.length === 0) return alert("Please upload files first.");
            
            // Save tasks specifically to this user
            const allTasks = JSON.parse(localStorage.getItem("antana_tasks") || "{}");
            allTasks[currentUser.email] = Array.from(files).map(f => f.name);
            localStorage.setItem("antana_tasks", JSON.stringify(allTasks));
            
            alert("Workspace ready for " + currentUser.name);
        }

        function logout() {
            localStorage.removeItem("antana_user");
            location.reload();
        }

        // Check login on load
        window.onload = initDashboard;
    </script>
</body>
</html>
